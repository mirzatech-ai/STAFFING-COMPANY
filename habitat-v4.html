// === v4.5.1 · OBSTACLE-AWARE PATHFINDING (Skill #26) ===
// Mo 2026-05-17: "agents walking through the conference table" — fix is waypoint routing
// Office obstacles: conference table center (x in -2.5..2.5 · z in 4..7), desk rows (z in 0..3.5)
// Strategy: route via perimeter aisles · 4 corner waypoints + 4 side midpoints
// For ANY desk → prop trip: from desk-z, go to nearest perimeter Z (z=-2 back aisle OR z=8 front aisle), then to prop-z
function computeOfficePath(from, to){
  // If start and end are already on same side of conference (z < 4) or both far from obstacles, go direct
  const confZmin = 3.5, confZmax = 7.5, confXmin = -2.8, confXmax = 2.8;
  const insideConf = (p) => p.x > confXmin && p.x < confXmax && p.z > confZmin && p.z < confZmax;
  const crossesConf = (() => {
    // Sample 8 points along the straight line · if any falls in conf zone → must route around
    for (let i = 1; i < 8; i++){
      const t = i / 8;
      const px = from.x + (to.x - from.x) * t;
      const pz = from.z + (to.z - from.z) * t;
      if (px > confXmin && px < confXmax && pz > confZmin && pz < confZmax && !insideConf(to)) return true;
    }
    return false;
  })();

  const path = [];
  if (crossesConf) {
    // Route around the conference: go to the side aisle on the closer X side
    const sideX = (from.x < 0) ? confXmin - 0.8 : confXmax + 0.8;
    // Step 1: leave desk going forward into the front aisle (z just below confZmin)
    path.push({x: from.x, z: 3.0});
    // Step 2: slide along the front aisle to the side
    path.push({x: sideX, z: 3.0});
    // Step 3: travel up alongside the conference
    path.push({x: sideX, z: Math.max(to.z, confZmax) });
    // Step 4: approach the target from the outside
    path.push({x: to.x, z: to.z});
  } else {
    // Direct path is safe (target on same side or perimeter prop like printer/whiteboard)
    // Still pass through the desk's front aisle as a single via point to avoid the desk row itself
    if (Math.abs(from.z - to.z) > 1.5) {
      path.push({x: from.x, z: (from.z < to.z) ? from.z + 1.2 : from.z - 1.2});
    }
    path.push({x: to.x, z: to.z});
  }
  return path;
}

  // v4.7.0 · SIMCITY-GRADE PROCEDURAL FACADE (Skill #37)
  // 256×512 canvas · architectural strips · warm/cool window mix · ground-floor lobby · cornice trim
  // Returns a different layout per variantIdx so adjacent buildings of same category don't look identical
  function makeSimCityFacade(catHex, variantIdx){
    const c = document.createElement('canvas');
    c.width = 256; c.height = 512;
    const ctx = c.getContext('2d');
    const accent = '#' + catHex.toString(16).padStart(6, '0');

    // Dark facade base · varies slightly by variant
    const baseShades = ['#080d18', '#0a1020', '#0c0e1a', '#0a0e18'];
    ctx.fillStyle = baseShades[variantIdx % 4];
    ctx.fillRect(0, 0, 256, 512);

    // Vertical structural mullions (architectural detail · faint dark lines)
    ctx.strokeStyle = 'rgba(20,28,46,0.7)';
    ctx.lineWidth = 1.5;
    for (let v = 0; v <= 5; v++){
      const vx = v * (256/5);
      ctx.beginPath(); ctx.moveTo(vx, 16); ctx.lineTo(vx, 480); ctx.stroke();
    }

    // Window light palette (warm bias · NYC-night vibe)
    const litPalette = [
      'rgba(245,214,128,', // warm yellow
      'rgba(255,181,71,',  // warm amber
      'rgba(245,210,160,', // soft warm
      'rgba(255,195,90,',  // amber
      'rgba(128,212,255,', // cool cyan (15% mix)
      'rgba(64,96,144,',   // dim blue
    ];
    const warmMix = 0.78;  // 78% warm, 22% cool

    // Window grid · 5 cols × 16 rows · cell ~50×30
    const cols = 5, rows = 16;
    const cellW = 256 / cols;
    const cellH = 480 / rows;
    // Pick 2 setback rows for architectural breaks (per-variant)
    const setbackA = 4 + (variantIdx % 3);
    const setbackB = 10 + (variantIdx % 3);

    for (let r = 0; r < rows; r++){
      // Setback / mech-floor rows (no windows · dark band)
      if (r === setbackA || r === setbackB){
        ctx.fillStyle = baseShades[(variantIdx + 1) % 4];
        ctx.fillRect(0, r * cellH + 16, 256, 6);
        // Faint horizontal cornice line at setback
        ctx.fillStyle = accent;
        ctx.globalAlpha = 0.35;
        ctx.fillRect(0, r * cellH + 18, 256, 1.5);
        ctx.globalAlpha = 1;
        continue;
      }

      for (let cc = 0; cc < cols; cc++){
        const wx = cc * cellW + 6;
        const wy = r * cellH + 20;
        const ww = cellW - 12;
        const wh = cellH - 10;

        // Window frame · dark obsidian border
        ctx.fillStyle = '#03070e';
        ctx.fillRect(wx - 2, wy - 2, ww + 4, wh + 4);

        // Window state · weighted random
        const roll = Math.random();
        let lit = null;
        if (roll < 0.20) lit = null;   // 20% dark (some offices closed)
        else if (roll < 0.20 + warmMix * 0.5) lit = litPalette[Math.floor(Math.random()*4)];   // warm 39%
        else if (roll < 0.20 + warmMix * 0.5 + 0.10) lit = litPalette[4];   // cyan 8%
        else if (roll < 0.85) lit = litPalette[5];   // dim blue 25%
        else lit = litPalette[Math.floor(Math.random()*4)];   // remaining warm

        if (lit){
          const alpha = 0.55 + Math.random() * 0.45;
          ctx.fillStyle = lit + alpha.toFixed(2) + ')';
          ctx.fillRect(wx, wy, ww, wh);
          // Top-edge highlight (light source reflecting off window top)
          ctx.fillStyle = 'rgba(255,255,255,0.18)';
          ctx.fillRect(wx, wy, ww, 1.5);
          // Vertical blind hint (sometimes · half a window darker)
          if (Math.random() > 0.7){
            ctx.fillStyle = 'rgba(8,12,24,0.55)';
            ctx.fillRect(wx + ww*0.4, wy + 1, ww*0.3, wh - 2);
          }
        }
      }
    }

    // Cornice line at very top (architectural accent · category-colored)
    ctx.fillStyle = accent;
    ctx.globalAlpha = 0.85;
    ctx.fillRect(0, 0, 256, 4);
    ctx.fillRect(0, 12, 256, 1.5);
    ctx.globalAlpha = 1;

    // Ground floor / lobby (taller · brighter · warm lobby light)
    ctx.fillStyle = '#02060c';
    ctx.fillRect(0, 480, 256, 32);
    const lobbyColor = 'rgba(255,200,120,0.85)';
    ctx.fillStyle = lobbyColor;
    // 3 lobby windows · larger than floor windows
    ctx.fillRect(18, 488, 64, 20);
    ctx.fillRect(96, 488, 64, 20);
    ctx.fillRect(174, 488, 64, 20);
    // Lobby door (slightly darker · center)
    ctx.fillStyle = '#1a1810';
    ctx.fillRect(118, 492, 20, 16);
    // Entry-canopy edge (catcolor-tinted)
    ctx.fillStyle = accent;
    ctx.globalAlpha = 0.65;
    ctx.fillRect(0, 478, 256, 2);
    ctx.globalAlpha = 1;

    const tex = new THREE.CanvasTexture(c);
    tex.anisotropy = 8;
    return tex;
  }

function rerouteMayaOutbound(p){
  const dests = buildings.filter(b => b.userData.slug && !b.userData.slug.startsWith('pad_') && b.userData.slug !== '_council');
  if (dests.length === 0) return;
  const dest = dests[Math.floor(Math.random() * dests.length)];
  p.startPos.set(0, 1.4, -SPACING * (GRID_N/2 + 1.4));
  p.endPos = dest.position.clone();
  p.endPos.y = dest.userData.baseY + dest.userData.height/2;
  p.color = Math.random() < 0.7 ? new THREE.Color(0xf5c542) : new THREE.Color(dest.userData.baseColor);
  p.progress = 0;
  p.speed = 0.0045 + Math.random()*0.007;
  p.destSlug = dest.userData.slug;
}

// v4.8.1 · MAYA CORE FLASH BUDGET · momentary brighten on packet send/receive (visible "pulse" of activity)
let mayaCoreFlashIntensity = 0;
function pulseMayaCore(amount){
  mayaCoreFlashIntensity = Math.min(1.5, mayaCoreFlashIntensity + amount);
}

function animateMayaOutbound(){
  if (!mayaOutboundPoints) return;
  const posAttr = mayaOutboundGeo.getAttribute('position');
  const colAttr = mayaOutboundGeo.getAttribute('color');
  mayaOutbound.forEach((p, i) => {
    const prevProgress = p.progress;
    p.progress += p.speed;
    // Flash on PACKET DEPARTURE (just after reroute · progress was 0)
    if (prevProgress < 0.02 && p.progress >= 0.02){ pulseMayaCore(0.18); }
    if (p.progress >= 1) rerouteMayaOutbound(p);
    const t = Math.max(0, Math.min(1, p.progress));
    const x = p.startPos.x + (p.endPos.x - p.startPos.x) * t;
    const z = p.startPos.z + (p.endPos.z - p.startPos.z) * t;
    // v4.8.1 · lower arc 5.5 → 3.5 · keeps packets in camera frame at wider SPACING=2.8 grid
    const arcY = 3.5 * t * (1 - t);
    const y = (p.startPos.y + (p.endPos.y - p.startPos.y) * t) + arcY * 1.4;
    posAttr.setXYZ(i, x, y, z);
    colAttr.setXYZ(i, p.color.r, p.color.g, p.color.b);
  });
  posAttr.needsUpdate = true;
  colAttr.needsUpdate = true;
}

// === v4.6.0 · D-02 · STREET NETWORK + INTER-BUILDING COURIERS (Skill #33) ===
// Mo: "streets between agencies need to feel alive · couriers in the streets between those agencies"
// Adds visible aisle strips on the ground in BOTH axes between building rows, plus 12 courier packets
// that travel between random building pairs · packets pulse · pop on arrival
const macroCouriers = [];
const COURIER_COUNT = 12;
let streetGeo = null, streetMesh = null;

function buildStreetNetwork(){
  // Build "streets" as a single BufferGeometry of thin glowing strips between building rows
  const positions = [];
  // 10×10 buildings · streets run between rows (offset half-spacing) · X-axis streets and Z-axis streets
  const half = (GRID_N - 1) * SPACING / 2;
  const lanes = [];
  for (let i = 0; i <= GRID_N; i++){
    const offset = (i - GRID_N/2) * SPACING;
    // X-running street at z = offset
    lanes.push({type:'x', z: offset, len: GRID_N * SPACING});
    // Z-running street at x = offset
    lanes.push({type:'z', x: offset, len: GRID_N * SPACING});
  }
  // Render each street as a thin neon strip
  lanes.forEach(L => {
    const stripGeo = (L.type === 'x')
      ? new THREE.PlaneGeometry(L.len, 0.18)
      : new THREE.PlaneGeometry(0.18, L.len);
    const stripMat = new THREE.MeshBasicMaterial({color: 0x00f2fe, transparent:true, opacity:0.30});
    const strip = new THREE.Mesh(stripGeo, stripMat);
    strip.rotation.x = -Math.PI/2;
    strip.position.set(L.type === 'z' ? L.x : 0, 0.01, L.type === 'x' ? L.z : 0);
    scene.add(strip);
  });
}

// v4.6.1 · MANHATTAN STREET ROUTING (Skill #36) · Mo: "couriers travelling diagonally under buildings · must travel on the streets"
// Compute a right-angle path from A to B that stays on the visible street grid (between building rows/cols)
// Buildings sit between streets at half-step offsets · waypoints snap to street offsets (offset = (i - GRID_N/2) * SPACING)
function buildCourierPath(from, to){
  const HALF = SPACING / 2;
  // Exit A on the street nearest B in the X direction
  const dx = to.position.x - from.position.x;
  const dz = to.position.z - from.position.z;
  const exitX = from.position.x + (Math.abs(dx) < 0.01 ? 0 : Math.sign(dx) * HALF);   // street next to A on B's side
  // Approach B on the street nearest A in the Z direction
  const entryZ = to.position.z + (Math.abs(dz) < 0.01 ? 0 : -Math.sign(dz) * HALF);   // street next to B on A's side
  // Y stays low on the streets (y=0.5) · couriers ride the road, not arc through the air
  const ROAD_Y = 0.55;
  return [
    {x: from.position.x, y: ROAD_Y, z: from.position.z},   // start at A
    {x: exitX,           y: ROAD_Y, z: from.position.z},   // exit A onto perpendicular street
    {x: exitX,           y: ROAD_Y, z: entryZ},            // turn corner at intersection
    {x: to.position.x,   y: ROAD_Y, z: entryZ},            // travel along B's perpendicular street
    {x: to.position.x,   y: ROAD_Y, z: to.position.z}      // arrive at B
  ];
}

function spawnMacroCouriers(){
  const sources = buildings.filter(b => b.userData.slug && !b.userData.slug.startsWith('pad_') && b.userData.slug !== '_council');
  if (sources.length < 2) return;
  // v4.7.1 · COURIERS BRIGHTER + LARGER (Mo: "data packets need to super bright as they travel the streets")
  const courierGeo = new THREE.SphereGeometry(0.30, 16, 16);
  const trailGeo = new THREE.SphereGeometry(0.55, 14, 14);
  const auraGeo = new THREE.SphereGeometry(0.85, 12, 12);
  for (let i = 0; i < COURIER_COUNT; i++){
    const a = sources[Math.floor(Math.random() * sources.length)];
    let b = sources[Math.floor(Math.random() * sources.length)];
    while (b === a) b = sources[Math.floor(Math.random() * sources.length)];
    const color = a.userData.baseColor || 0x00f2fe;
    // Core packet · pure-bright basic (depthTest:false so it punches through bloom)
    const mat = new THREE.MeshBasicMaterial({color, transparent:true, opacity:1.0, depthTest:false, blending:THREE.AdditiveBlending});
    // Inner halo glow
    const trailMat = new THREE.MeshBasicMaterial({color, transparent:true, opacity:0.55, depthTest:false, blending:THREE.AdditiveBlending});
    // Outer corona aura · super bright streak
    const auraMat = new THREE.MeshBasicMaterial({color, transparent:true, opacity:0.25, depthTest:false, blending:THREE.AdditiveBlending});
    const mesh = new THREE.Mesh(courierGeo, mat);
    const trail = new THREE.Mesh(trailGeo, trailMat);
    const aura = new THREE.Mesh(auraGeo, auraMat);
    mesh.renderOrder = 900; trail.renderOrder = 899; aura.renderOrder = 898;
    scene.add(mesh); scene.add(trail); scene.add(aura);
    macroCouriers.push({
      mesh, trail, mat, trailMat,
      aura, auraMat,
      from: a, to: b,
      path: buildCourierPath(a, b),
      pathIdx: 0,
      segProgress: Math.random(),
      segSpeed: 0.012 + Math.random()*0.015,
    });
  }
}

function animateMacroCouriers(){
  if (!macroCouriers.length) return;
  const sources = buildings.filter(b => b.userData.slug && !b.userData.slug.startsWith('pad_') && b.userData.slug !== '_council');
  macroCouriers.forEach(c => {
    if (!c.path || !c.path.length) c.path = buildCourierPath(c.from, c.to);
    const segCount = c.path.length - 1;
    // Advance progress within current segment
    c.segProgress += c.segSpeed;
    while (c.segProgress >= 1 && c.pathIdx < segCount){
      c.segProgress -= 1;
      c.pathIdx += 1;
    }
    if (c.pathIdx >= segCount){
      // Arrived · reroute · pick a new destination from current location
      c.from = c.to;
      let next = sources[Math.floor(Math.random() * sources.length)];
      while (next === c.from && sources.length > 1) next = sources[Math.floor(Math.random() * sources.length)];
      c.to = next;
      c.path = buildCourierPath(c.from, c.to);
      c.pathIdx = 0;
      c.segProgress = 0;
      c.segSpeed = 0.012 + Math.random()*0.015;
      const newColor = c.from.userData.baseColor || 0x00f2fe;
      c.mat.color.setHex(newColor);
      c.trailMat.color.setHex(newColor);
      if (c.auraMat) c.auraMat.color.setHex(newColor);
      return;
    }
    // Lerp between current waypoint and next
    const a = c.path[c.pathIdx];
    const b = c.path[c.pathIdx + 1];
    const t = c.segProgress;
    const px = a.x + (b.x - a.x) * t;
    const py = a.y + (b.y - a.y) * t;
    const pz = a.z + (b.z - a.z) * t;
    c.mesh.position.set(px, py, pz);
    c.trail.position.set(px, py - 0.05, pz);
    if (c.aura) c.aura.position.set(px, py, pz);
    // Pulse opacity overall trip progress for "breathing" · everything stays bright
    const tripProgress = (c.pathIdx + c.segProgress) / segCount;
    const pulse = 0.85 + 0.15 * Math.sin(tripProgress * Math.PI);   // less dim · stay bright
    c.mat.opacity = pulse;
    c.trailMat.opacity = 0.55 * pulse;
    if (c.auraMat) c.auraMat.opacity = 0.30 * pulse;
  });
}

function reroutePacket(p){
  const sources = buildings.filter(b => b.userData.slug && !b.userData.slug.startsWith('pad_') && b.userData.slug !== '_council');
  if(sources.length === 0) return;
  const src = sources[Math.floor(Math.random() * sources.length)];
  p.startPos = src.position.clone();
  p.startPos.y = src.userData.baseY + src.userData.height/2;
  p.endPos = new THREE.Vector3(0, 1.4, -SPACING * (GRID_N/2 + 1.4));
  p.color = new THREE.Color(src.userData.baseColor);
  p.progress = 0;
  p.speed = 0.004 + Math.random()*0.006;
  p.sourceSlug = src.userData.slug;
}

function animatePackets(){
  if(!dataPacketPoints) return;
  const posAttr = dataPacketGeo.getAttribute('position');
  const colAttr = dataPacketGeo.getAttribute('color');
  dataPackets.forEach((p, i) => {
    const prevProgress = p.progress;
    p.progress += p.speed;
    // v4.8.1 · Flash Maya core on INBOUND PACKET ARRIVAL (visible "received" pulse)
    if (prevProgress < 0.98 && p.progress >= 0.98){ pulseMayaCore(0.14); }
    if(p.progress >= 1){ reroutePacket(p); }
    const t = Math.max(0, Math.min(1, p.progress));
    const x = p.startPos.x + (p.endPos.x - p.startPos.x) * t;
    const z = p.startPos.z + (p.endPos.z - p.startPos.z) * t;
    const arcY = 4 * t * (1 - t);
    const y = (p.startPos.y + (p.endPos.y - p.startPos.y) * t) + arcY * 1.4;
    posAttr.setXYZ(i, x, y, z);
    colAttr.setXYZ(i, p.color.r, p.color.g, p.color.b);
  });
  posAttr.needsUpdate = true;
  colAttr.needsUpdate = true;
}

// === CLICK BURST (Gemini directive 3 · burst from clicked tower toward Council) ===
const burstPool = [];
function fireClickBurst(srcMesh){
  if(srcMesh.userData.slug === '_council') return;
  const startPos = srcMesh.position.clone();
  startPos.y = srcMesh.userData.baseY + srcMesh.userData.height/2;
  const endPos = new THREE.Vector3(0, 1.4, -SPACING * (GRID_N/2 + 1.4));
  // FIX 2026-05-17T17:35Z · was 0.11 sphere · now 0.22 (4x volume · way more visible)
  const sphereGeo = new THREE.SphereGeometry(0.22, 12, 12);
  for(let i = 0; i < 7; i++){
    const mat = new THREE.MeshBasicMaterial({color:0xffffff, transparent:true, opacity:1, depthTest:false});
    const mesh = new THREE.Mesh(sphereGeo, mat);
    mesh.renderOrder = 1000;
    mesh.position.copy(startPos);
    scene.add(mesh);
    burstPool.push({
      mesh, startPos: startPos.clone(), endPos: endPos.clone(),
      progress: -i * 0.06,
      speed: 0.020 + Math.random()*0.008,
      dead: false
    });
  }
}

function animateBursts(){
  for(let i = burstPool.length - 1; i >= 0; i--){
    const p = burstPool[i];
    if(p.dead){ scene.remove(p.mesh); p.mesh.material.dispose(); burstPool.splice(i, 1); continue; }
    p.progress += p.speed;
    if(p.progress < 0){ p.mesh.material.opacity = 0; continue; }
    if(p.progress >= 1){ p.dead = true; continue; }
    const t = p.progress;
    p.mesh.position.x = p.startPos.x + (p.endPos.x - p.startPos.x) * t;
    p.mesh.position.z = p.startPos.z + (p.endPos.z - p.startPos.z) * t;
    const arcY = 4 * t * (1 - t);
    p.mesh.position.y = (p.startPos.y + (p.endPos.y - p.startPos.y) * t) + arcY * 2.2;
    p.mesh.material.opacity = (1 - t) * 0.95;
  }
}

// Smooth camera focus on a target building (mobile · Gemini directive 4)
function focusCameraOn(target){
  // Pan the camera target slightly toward the building · keep iso angle locked
  const px = target.position.x, pz = target.position.z;
  const steps = 24;
  let i = 0;
  const startCx = camAngle.y, startCx2 = camAngle.x;
  // We don't move the camera position drastically · we just tilt the lookAt
  // For ortho cam, easier: shift the camera + lookAt by a fraction of the offset
  const cameraOffsetX = px * 0.4, cameraOffsetZ = pz * 0.4;
  function step(){
    if(i++ > steps) return;
    const t = i / steps;
    camera.position.x = camRadius * Math.sin(camAngle.y) * Math.cos(camAngle.x) + cameraOffsetX * t;
    camera.position.z = camRadius * Math.cos(camAngle.y) * Math.cos(camAngle.x) + cameraOffsetZ * t;
    camera.lookAt(cameraOffsetX * t, 0, cameraOffsetZ * t);
    requestAnimationFrame(step);
  }
  step();
}

function setBuildingState(slug, state){
  const m = buildings.find(b => b.userData.slug === slug);

  else if(state === 'council'){ m.material.emissive.setHex(0xf5c542); }
  else if(state === 'error'){ m.material.emissive.setHex(0xff5b6a); }
  else { m.material.emissive.setHex(m.userData.baseColor || 0x00d4ff); }
  workingCount = buildings.filter(b => b.userData.state === 'working').length;
  document.getElementById('t_working').textContent = workingCount;
}

const camRadius = 48;
function updateCamera(){
  camAngle.x = Math.max(0.2, Math.min(Math.PI/2 - 0.05, camAngle.x));
  camera.position.x = camRadius * Math.sin(camAngle.y) * Math.cos(camAngle.x);
  camera.position.y = camRadius * Math.sin(camAngle.x);
  camera.position.z = camRadius * Math.cos(camAngle.y) * Math.cos(camAngle.x);
  camera.lookAt(0, 0, 0);
}

function pulseAll(){
  // GEMINI ROUND-3 DIRECTIVE: PULSE ALL must fire VISIBLE particle streams from every building toward Council
  // Each building goes 'working' AND emits 3 white burst particles flying toward the chamber
  const live = buildings.filter(b => b.userData.slug && b.userData.slug !== '_council' && !b.userData.slug.startsWith('pad_'));
  live.forEach((b, idx) => {

  });
}

// ============ ANIMATE ============
let t = 0;
function animate(){
  requestAnimationFrame(animate);
  t += 0.016;
  if(autoRotate){ camAngle.y += 0.003; updateCamera(); }

  // GEMINI BELT-AND-SUSPENDERS · per-frame hard clamp on Council Chamber position
  // (his exact verbatim recommendation: "Force the ring to stay strictly flush with the terrain")
  // Even if something else in code mutates it, this re-anchors every frame · cost: ~negligible
  const _council = buildings.find(b => b.userData && b.userData.slug === '_council');
  if(_council){
    _council.position.x = 0;
    _council.position.y = 1.1;                           // baseY anchor
    _council.position.z = -SPACING * (GRID_N/2 + 1.4);
  }

  // Subtle pulse on 'working' state buildings
  buildings.forEach(b => {
    if(b.userData.state === 'working' && b.userData.slug !== '_council'){
      b.material.emissiveIntensity = 0.65 + 0.35 * Math.sin(t * 4);
    }
  });
  // Kinetic data-packet traffic (Gemini directive 3)
  if(dataPackets.length) animatePackets();
  // v4.7.2 · MAYA OUTBOUND packets · Maya broadcasting to agencies
  if(mayaOutbound.length) animateMayaOutbound();
  // v4.6.0 · D-02 · animate the inter-building couriers along the street network
  if(macroCouriers.length) animateMacroCouriers();
  // v4.7.2 · MAYA SCI-FI animation · spinning rings · pulsing core · sky beam shimmer · orbiting dots
  if (scene.userData.mayaSciFi){
    const m = scene.userData.mayaSciFi;
    const tM = performance.now() / 1000;
    // Orbital rings rotate at different speeds + axes
    m.orbitalRings.forEach((ring, idx) => {
      if (ring.userData.spinAxis === 'y') ring.rotation.y += ring.userData.spinSpeed;
      else ring.rotation.x += ring.userData.spinSpeed;
      ring.rotation.z += ring.userData.spinSpeed * 0.35;
    });
    // v4.8.1 · core pulse + packet-traffic flash (Mo: visible "send/receive" pulse)
    // Decay flash intensity each frame · packets bump it up via pulseMayaCore()
    mayaCoreFlashIntensity = Math.max(0, mayaCoreFlashIntensity - 0.06);
    if (m.mayaCore){
      const basePulse = 0.85 + 0.20 * Math.sin(tM * 2.2);
      const flashed = basePulse + mayaCoreFlashIntensity * 0.45;
      m.mayaCore.scale.setScalar(flashed);
      m.mayaCore.material.opacity = Math.min(1.0, 0.85 + 0.15 * Math.sin(tM * 2.2) + mayaCoreFlashIntensity * 0.3);
    }
    if (m.mayaCoreHalo){
      const haloPulse = 1.0 + 0.30 * Math.sin(tM * 1.4) + mayaCoreFlashIntensity * 0.55;
      m.mayaCoreHalo.scale.setScalar(haloPulse);
      m.mayaCoreHalo.material.opacity = Math.min(0.85, 0.20 + 0.18 * Math.abs(Math.sin(tM * 1.4)) + mayaCoreFlashIntensity * 0.45);
    }
    // Sky beam shimmer
    if (m.skyBeam){
      m.skyBeam.material.opacity = 0.15 + 0.10 * Math.sin(tM * 1.7);
      m.skyBeam.rotation.y += 0.003;
    }
    // Orbital particles · each moves around the dome
    m.orbiters.forEach(dot => {
      const u = dot.userData;
      u.angle += u.speed;
      const x = Math.cos(u.angle) * u.radius;
      const z = Math.sin(u.angle) * u.radius;
      const y = 1.15 + u.vertOffset + Math.sin(tM * 1.5 + u.vertOsc) * 0.18;
      dot.position.set(x, y, z);
    });
  }
  // v4.7.0 · BEACON BLINK · aviation-red rooftop beacons pulse every ~1.4s
  if(buildings._allBeacons && buildings._allBeacons.length){
    const tBeacon = performance.now() / 1000;
    buildings._allBeacons.forEach(b => {
      const phase = b.userData.blinkPhase || 0;
      // Sharp blink · mostly dim · sin-squared spike
      const k = Math.abs(Math.sin(tBeacon * 2.3 + phase));
      const blink = k > 0.85 ? 1.0 : 0.20;
      b.material.opacity = 0.40 + 0.60 * blink;
      b.scale.setScalar(0.85 + 0.30 * blink);
    });
  }
  if(burstPool.length)   animateBursts();
  renderer.render(scene, camera);
}

async function dispatch(slug, cat){

// Per NPC: clone the cached scene + spawn an AnimationMixer + play one of the named clips

function preloadCyberRobot(){
  if (robotLoadState !== 'idle') return;
  robotLoadState = 'loading';
  if (!THREE.GLTFLoader) { console.warn('[v4.6] GLTFLoader not available · falling back to procedural'); robotLoadState = 'failed'; return; }
  const loader = new THREE.GLTFLoader();
  loader.load(ROBOT_GLB_URL,
    (gltf) => {
      cachedRobot = gltf.scene;
      cachedRobotClips = gltf.animations;
      robotLoadState = 'loaded';
      console.log('[v4.6] CyberRobot loaded ·', cachedRobotClips.length, 'clips:', cachedRobotClips.map(c=>c.name).join(', '));
    },

  );
}

// Cyber-tint palette · NOT human skin · matches v4.5.3 cyber-bot palette
const CYBER_TINT_PALETTE = [0x00d4ff, 0x43e6a1, 0xf5c542, 0xa384ff, 0xff5cc4, 0x4cd9ff, 0x6ee7e7, 0xff8a4c];

// Build a cyber-robot instance · cloned from cache · re-materialed with cyan/holographic + variant tint
// Returns {mesh, mixer, currentAnim, clips, head, torso} so animator + raycaster still work
function createCyberRobot(variantIdx, initialAnim, scale){
  if (!cachedRobot || !cachedRobotClips) return null;
  // Deep clone the scene (handles skinned meshes correctly in r0.146 GLTFLoader)
  const mesh = cachedRobot.clone(true);
  // Walk the clone · rebind skeletons + re-material every mesh
  const tint = CYBER_TINT_PALETTE[variantIdx % CYBER_TINT_PALETTE.length];
  const cyberMat = new THREE.MeshPhysicalMaterial({
    color: tint, emissive: tint, emissiveIntensity: 0.40,
    metalness: 0.75, roughness: 0.25, clearcoat: 0.85, clearcoatRoughness: 0.15
  });
  // Helper · for skinned children we need to clone the material per mesh (avoid shared-state bugs)
  mesh.traverse(child => {
    if (child.isMesh || child.isSkinnedMesh) {
      // Some sub-meshes may benefit from a slightly different tint (eye band etc) · simple approach: tint all
      child.material = cyberMat.clone();
      child.castShadow = true;
    }
  });
  const s = scale || 0.50;   // RobotExpressive is ~1m tall · scale 0.50 ≈ matches our seated body ~1.5m
  mesh.scale.setScalar(s);
  // Spawn mixer + play initial clip
  const mixer = new THREE.AnimationMixer(mesh);
  let currentAnim = initialAnim || 'Walking';
  const clip = THREE.AnimationClip.findByName(cachedRobotClips, currentAnim);
  if (clip) { mixer.clipAction(clip).play(); }
  // Locate the torso + head if present (for raycasting compatibility)
  let torso = null, head = null;
  mesh.traverse(child => {
    if (child.isMesh || child.isSkinnedMesh) {
      const n = (child.name || '').toLowerCase();
      if (!torso && (n.includes('torso') || n.includes('body') || n.includes('chest'))) torso = child;
      if (!head && n.includes('head')) head = child;
    }
  });
  if (!torso) {
    // Fallback: use the first mesh as torso
    mesh.traverse(child => { if (!torso && (child.isMesh || child.isSkinnedMesh)) torso = child; });
  }
  return {mesh, mixer, currentAnim, clips: cachedRobotClips, head, torso, tint};
}

function setCyberRobotAnim(robot, animName){
  if (!robot || !robot.mixer || !robot.clips) return;
  if (robot.currentAnim === animName) return;
  const clip = THREE.AnimationClip.findByName(robot.clips, animName);
  if (!clip) return;
  // Crossfade for smooth transitions
  robot.mixer.stopAllAction();
  const action = robot.mixer.clipAction(clip);
  action.reset().fadeIn(0.25).play();
  robot.currentAnim = animName;
}

function buildOfficeScene(agency){
  const stage = document.getElementById('officeStage');
  // Clean previous
  if(officeRenderer){
    officeRenderer.dispose(); officeRenderer.domElement.remove();
    if(officeRAF) cancelAnimationFrame(officeRAF);
  }
  // v4.4.7/8 · reset walker registry + props + dispatch state so cross-agency jumps don't leak
  officeWalkers = [];
  officeProps = [];
  officePropLabels = [];
  officeOutboundConduit = null;
  dispatchActive = false;
  // v4.5.1/4.5.2 · purge previous DOM labels (agents + props share the same layer)
  const layer = document.getElementById('agentLabelLayer');
  if (layer) layer.innerHTML = '';
  officeScene = new THREE.Scene();
  officeScene.background = new THREE.Color(0x050912);
  officeScene.fog = new THREE.Fog(0x050912, 18, 38);

  const w = stage.clientWidth, h = stage.clientHeight;
  const aspect = w/h;
  const viewSize = 9;
  officeCamera = new THREE.OrthographicCamera(-viewSize*aspect, viewSize*aspect, viewSize, -viewSize, 0.1, 100);
  officeCamera.position.set(14, 12, 14);
  officeCamera.lookAt(0, 0, 0);

  officeRenderer = new THREE.WebGLRenderer({antialias:true});
  officeRenderer.setSize(w, h);
  officeRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  officeRenderer.shadowMap.enabled = true;
  officeRenderer.toneMapping = THREE.ACESFilmicToneMapping;
  officeRenderer.toneMappingExposure = 1.1;
  stage.appendChild(officeRenderer.domElement);

  // === v4.4.5 · CINEMATIC POST-PROCESSING (Mo: "make it bleed light · SimCity glow") ===
  // UnrealBloomPass forces every emissive material (monitors, server LEDs, agent cores, packets)
  // to physically radiate light into the dark slate atmosphere. Falls back to direct render if
  // examples/js failed to load (jsdelivr hiccup) so we never go black.
  officeComposer = null; officeBloomPass = null;
  try {
    if (THREE.EffectComposer && THREE.UnrealBloomPass && THREE.RenderPass) {
      officeComposer = new THREE.EffectComposer(officeRenderer);
      officeComposer.setSize(w, h);
      const renderPass = new THREE.RenderPass(officeScene, officeCamera);
      officeComposer.addPass(renderPass);
      // strength 1.35 · radius 0.55 · threshold 0.18 · tuned for the dark-room neon vibe
      officeBloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(w, h), 1.35, 0.55, 0.18);
      officeComposer.addPass(officeBloomPass);
    }
  } catch (e) {
    console.warn('UnrealBloom init failed · falling back to direct render', e);
    officeComposer = null;
  }

  // FIX 2026-05-17T19:10Z · init camera state BEFORE animate loop starts (was null on first frame · TypeError on lookAt)
  officeCamRadius = 18;
  officeCamAngle = {y: Math.PI/4, x: Math.PI/4.2};
  officeCamTarget = new THREE.Vector3(0, 0.5, 0);
  userTouchedOfficeCam = false;

  // Lighting
  officeScene.add(new THREE.AmbientLight(0x404560, 0.6));
  const sun = new THREE.DirectionalLight(0xfff5e0, 0.9);
  sun.position.set(8, 18, 6); sun.castShadow = true;
  officeScene.add(sun);
  const rim = new THREE.PointLight(0x00e4ff, 0.6, 30);
  rim.position.set(-8, 6, -8);
  officeScene.add(rim);

  // Get category color for the agency · drives accent lighting
  const cat = categorize(agency.id || agency.slug);
  const accent = CAT_COLOR[cat] || 0x00e4ff;
  const accentRim = new THREE.PointLight(accent, 0.7, 25);
  accentRim.position.set(0, 4, 8);
  officeScene.add(accentRim);

  // v4.5.1 · CLEAN SLATE FLOOR (rolled back from heavy circuit-trace clutter per Mo)
  // Dark base + thin grid · the cable conduits + wire packets do the visual heavy lifting on the floor
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(20, 20),
    new THREE.MeshStandardMaterial({color: 0x0a1226, metalness: 0.4, roughness: 0.65})
  );
  floor.rotation.x = -Math.PI/2; floor.receiveShadow = true;
  officeScene.add(floor);

  // Thin grid · subtle navigation aid · NOT the dense circuit clutter
  const gridLines = new THREE.GridHelper(20, 10, accent, 0x1a2540);
  gridLines.material.transparent = true; gridLines.material.opacity = 0.28;
  gridLines.position.y = 0.01;
  officeScene.add(gridLines);

  // PARTITION WALLS · low · neon-trim (per Gemini recipe)
  function makeWall(x, z, w, h, rot){
    const wall = new THREE.Mesh(
      new THREE.BoxGeometry(w, h, 0.2),
      new THREE.MeshPhysicalMaterial({color:0x0d1428, metalness:0.7, roughness:0.4, clearcoat:0.5})
    );
    wall.position.set(x, h/2, z); wall.rotation.y = rot;
    wall.castShadow = wall.receiveShadow = true;
    officeScene.add(wall);
    // Neon trim on top of wall

      new THREE.BoxGeometry(w, 0.04, 0.22),
      new THREE.MeshBasicMaterial({color:accent})
    );
    trim.position.set(x, h + 0.02, z); trim.rotation.y = rot;
    officeScene.add(trim);
  }
  makeWall(0, -10, 20, 1.5, 0);    // back
  makeWall(-10, 0, 20, 1.5, Math.PI/2);  // left
  makeWall(10, 0, 20, 1.5, Math.PI/2);   // right

  // SERVER RACKS · back wall row
  for(let i = 0; i < 5; i++){
    const rack = new THREE.Mesh(
      new THREE.BoxGeometry(1.2, 2.2, 0.6),
      new THREE.MeshPhysicalMaterial({color:0x0a0e1a, metalness:0.92, roughness:0.25})
    );
    rack.position.set(-7.5 + i*3.75, 1.1, -9);
    rack.castShadow = true;
    officeScene.add(rack);
    // LED status lights
    for(let j = 0; j < 4; j++){
      const led = new THREE.Mesh(
        new THREE.BoxGeometry(0.15, 0.05, 0.04),
        new THREE.MeshBasicMaterial({color: j%2 ? accent : 0x43e6a1})
      );
      led.position.set(-7.5 + i*3.75 - 0.4 + (j%2)*0.4, 0.7 + Math.floor(j/2)*0.6, -8.7);
      officeScene.add(led);
    }
  }

  // Per Gemini round-5: shadow maps on (already enabled at renderer); PCFSoft type set above
  officeRenderer.shadowMap.type = THREE.PCFSoftShadowMap;

  // SHADOW: configure sun for sharper shadows

  // Animate (round-5 + dual-track + round-7 humanoid)
  let oT = 0;
  function officeAnimate(){
    officeRAF = requestAnimationFrame(officeAnimate);
    oT += 0.016;
    const now = Date.now();
    // Per-agent: torso emissive pulse · head emissive pulse · breathing motion · inner octahedron spin · ring rotation
    officeAgents.forEach(ag => {
      const baseE = ag.state === 'PROCESSING' ? 1.0 : 0.5;
      const pulseE = baseE + 0.25 * Math.sin(oT * (ag.state === 'PROCESSING' ? 7 : 1.8) + ag.phase);
      ag.core.material.emissiveIntensity = pulseE;             // torso
      if(ag.head) ag.head.material.emissiveIntensity = 0.65 + 0.2 * Math.sin(oT * 1.5 + ag.phase);
      // Subtle breathing motion · whole body group rises/falls 0.025 units
      if(ag.bodyGroup) ag.bodyGroup.position.y = Math.sin(oT * 1.2 + ag.phase) * 0.025;
      // Inner octahedron · spin
      ag.innerCore.rotation.y += 0.025;
      ag.innerCore.rotation.x += 0.014;
      // Ring spin
      ag.ring.rotation.z = oT * 0.6 + ag.phase;
      // v4.4.5 · status beacon · pulses green on IDLE, white on PROCESSING, amber on WARN
      if (ag.beacon) {
        const beaconColor = ag.state === 'PROCESSING' ? 0xffffff
                          : ag.state === 'WARN' ? 0xf5c542
                          : 0x43e6a1;
        ag.beacon.material.color.setHex(beaconColor);
        const beaconPulse = ag.state === 'PROCESSING' ? 7 : 2.2;
        ag.beacon.material.opacity = 0.45 + 0.5 * Math.abs(Math.sin(oT * beaconPulse + ag.phase));
        ag.beacon.scale.setScalar(1 + 0.15 * Math.sin(oT * beaconPulse + ag.phase));
      }
      // v4.5.4 · hover brighten · when an agent is hovered, ramp emissive briefly (visual cue without text)
      if (ag.core && ag.core.material && ag.core.material.emissiveIntensity !== undefined) {
        const hoverBoost = ag.hovered ? 0.6 : 0;
        ag.core.material.emissiveIntensity = (ag.state === 'PROCESSING' ? 1.0 : 0.5) + 0.25 * Math.sin(oT * (ag.state === 'PROCESSING' ? 7 : 1.8) + ag.phase) + hoverBoost;
      }

      // v4.5.1 · DESK-BREAK ROUTINE with OBSTACLE-AWARE WAYPOINTS (Skill #22 + #26)
      // Mo: "these agents are walking THROUGH the table in the conference room" — fix is to route via aisle waypoints
      // States: seated → walking_to (along waypoint path) → dwelling → walking_back (reverse path) → seated
      const now = Date.now();
      if (ag.breakState === 'seated') {
        if (now >= ag.breakNextAt && officeProps.length > 0 && ag.state !== 'PROCESSING') {
          // Bounded · max 2 away · stagger break starts
          const awayCount = officeAgents.filter(a => a.breakState !== 'seated').length;
          if (awayCount < 2) {
            const prop = officeProps[Math.floor(Math.random() * officeProps.length)];
            ag.breakTarget = prop;
            if (ag.bodyGroup) ag.bodyGroup.visible = false;
            // v4.6.0 · prefer GLB cyber-robot if loaded · fall back to procedural humanoid (Skill #29 strategy)
            let worker = null;
            if (robotLoadState === 'loaded') {
              worker = createCyberRobot(ag.variantIdx, 'Walking', 0.50);
            }
            if (!worker) {
              worker = createProceduralHumanoid(0x00d4ff, ag.variantIdx);
            }
            worker.mesh.position.set(ag.dx, 0, ag.dz + 0.55);
            officeScene.add(worker.mesh);
            ag.breakWorker = worker;
            // Compute the obstacle-avoiding path from desk → prop using aisle waypoints
            ag.breakPath = computeOfficePath({x: ag.dx, z: ag.dz + 0.55}, {x: prop.x, z: prop.z});
            ag.breakPathIdx = 0;
            ag.breakState = 'walking_to';
            ag.currentTask = '→ ' + prop.name;
            renderAgentLabel(ag);
          }
        }
      } else if ((ag.breakState === 'walking_to' || ag.breakState === 'walking_back') && ag.breakWorker) {
        const w = ag.breakWorker;
        // Ensure walking clip if GLB robot
        if (w.mixer && w.currentAnim !== 'Walking') setCyberRobotAnim(w, 'Walking');
        // Current segment goal = path[breakPathIdx]
        const seg = ag.breakPath && ag.breakPath[ag.breakPathIdx];
        if (!seg) { ag.breakState = (ag.breakState === 'walking_to' ? 'dwelling' : 'seated'); }
        else {
          const dx2 = seg.x - w.mesh.position.x, dz2 = seg.z - w.mesh.position.z;
          const dist = Math.sqrt(dx2*dx2 + dz2*dz2);
          if (dist < 0.30) {
            // Reached this waypoint · advance to next
            ag.breakPathIdx += 1;
            if (ag.breakPathIdx >= ag.breakPath.length) {
              // Path complete
              if (ag.breakState === 'walking_to') {
                ag.breakState = 'dwelling';
                ag.breakDwellEnd = now + ag.breakTarget.dwellMs;
                ag.currentTask = '⌂ ' + ag.breakTarget.name;
                // v4.6.0 · pose Idle on dwelling for GLB robots · zero limbs for procedural
                if (w.mixer) setCyberRobotAnim(w, 'Idle');
                else { w.leftLeg.rotation.x = 0; w.rightLeg.rotation.x = 0; w.leftArm.rotation.x = 0; w.rightArm.rotation.x = 0; }
                renderAgentLabel(ag);
              } else {
                // walking_back complete · sit
                officeScene.remove(w.mesh);
                w.mesh.traverse(o => { if(o.geometry) o.geometry.dispose(); if(o.material){ Array.isArray(o.material)?o.material.forEach(m=>m.dispose()):o.material.dispose(); }});
                ag.breakWorker = null;
                if (ag.bodyGroup) ag.bodyGroup.visible = true;
                ag.breakState = 'seated';
                ag.breakNextAt = now + 20000 + Math.random()*30000;
                ag.breakTarget = null;
                ag.breakPath = null; ag.breakPathIdx = 0;
                ag.currentTask = 'standing by';
                renderAgentLabel(ag);
              }
            }
          } else {
            // Move toward this waypoint · same translation for both GLB and procedural
            const nx = dx2 / dist, nz = dz2 / dist;
            w.mesh.position.x += nx * 0.045;
            w.mesh.position.z += nz * 0.045;
            w.mesh.rotation.y = Math.atan2(nx, nz);
            // v4.6.0 · GLB robot uses AnimationMixer (handled in global mixer-update block) · procedural uses sin-swing
            if (!w.mixer) {
              const tt = oT * 4.5 + ag.phase;
              const swing = Math.sin(tt) * 0.55;
              w.leftLeg.rotation.x = swing; w.rightLeg.rotation.x = -swing;
              w.leftArm.rotation.x = -swing*0.7; w.rightArm.rotation.x = swing*0.7;
              w.mesh.position.y = Math.abs(Math.cos(tt)) * 0.06;
            }
          }
        }
      } else if (ag.breakState === 'dwelling' && ag.breakWorker) {
        const w = ag.breakWorker;
        // GLB robot: Idle clip plays from mixer; procedural: hand-rolled sway
        if (!w.mixer) {
          w.mesh.position.y = Math.sin(oT * 1.3 + ag.phase) * 0.012;
          w.leftArm.rotation.x = Math.sin(oT * 0.6 + ag.phase) * 0.10;
        }
        if (now >= ag.breakDwellEnd) {
          // Reverse the path for walking back
          ag.breakPath = computeOfficePath({x: w.mesh.position.x, z: w.mesh.position.z}, {x: ag.dx, z: ag.dz + 0.55});
          ag.breakPathIdx = 0;
          ag.breakState = 'walking_back';
          ag.currentTask = '↺ back to desk';
          renderAgentLabel(ag);
        }
      }
    });
    // Server LED flicker
    officeServerLEDs.forEach(L => {
      L.phase -= 1;
      if(L.phase <= 0){
        L.phase = 8 + Math.random()*40;
        const r = Math.random();
        const c = r < 0.7 ? 0x22c55e : (r < 0.92 ? 0xeab308 : 0xef4444);
        L.mesh.material.color.setHex(c);
        L.mesh.material.opacity = 0.6 + Math.random()*0.4;
      }
    });
    // v4.6.0 · GLB ROBOT MIXER UPDATE · drives rigged cyber-robot animations (Skill #32)
    const _delta = officeClock.getDelta();
    officeAgents.forEach(ag => {
      if (ag.breakWorker && ag.breakWorker.mixer) ag.breakWorker.mixer.update(_delta);
    });
    // CONSTANT BACKGROUND DATA PACKETS · flowing through the wire conduits
    if(officeBgPackets.length) animateOfficeBgPackets();
    // v4.5.1 · officeWalkers patrol-block REMOVED · desk agents are the only mover (break routine below)
    // File-drop particles
    if(officeDropParticles.length) animateDropParticles();
    // User-controlled camera (orbit + zoom · NO auto-drift while user has touched it · per Mo's "zoom further" need)
    if(!userTouchedOfficeCam){
      // Gentle drift before user takes control
      officeCamera.position.x = officeCamRadius * Math.sin(officeCamAngle.y) * Math.cos(officeCamAngle.x) + Math.sin(oT * 0.12) * 0.5;
      officeCamera.position.y = officeCamRadius * Math.sin(officeCamAngle.x);
      officeCamera.position.z = officeCamRadius * Math.cos(officeCamAngle.y) * Math.cos(officeCamAngle.x) + Math.cos(oT * 0.12) * 0.5;
    } else {
      officeCamera.position.x = officeCamRadius * Math.sin(officeCamAngle.y) * Math.cos(officeCamAngle.x);
      officeCamera.position.y = officeCamRadius * Math.sin(officeCamAngle.x);
      officeCamera.position.z = officeCamRadius * Math.cos(officeCamAngle.y) * Math.cos(officeCamAngle.x);
    }
    officeCamera.lookAt(officeCamTarget.x, officeCamTarget.y, officeCamTarget.z);
    // v4.5.1 · position DOM labels above their agents before rendering (so they update in sync)
    updateAgentLabelPositions();
    // v4.4.5 · route through bloom composer when available · fall back to direct render
    if (officeComposer) officeComposer.render();
    else officeRenderer.render(officeScene, officeCamera);
  }
  officeAnimate();

  // === USER CAMERA CONTROLS (per Mo "I need to be able to zoom in further") ===
  // (camera state already initialized at top of buildOfficeScene · per init-order fix 2026-05-17T19:10Z)
  let officeDrag = false, officeDragStart = {x:0,y:0};
  const canvas = officeRenderer.domElement;

  canvas.addEventListener('mousedown', e => { officeDrag = true; officeDragStart = {x:e.clientX, y:e.clientY}; userTouchedOfficeCam = true; });
  window.addEventListener('mouseup', () => { officeDrag = false; });
  window.addEventListener('mousemove', e => {
    if(!officeDrag || !officeRenderer) return;
    officeCamAngle.y -= (e.clientX - officeDragStart.x) * 0.008;
    officeCamAngle.x -= (e.clientY - officeDragStart.y) * 0.005;
    officeCamAngle.x = Math.max(0.1, Math.min(Math.PI/2 - 0.05, officeCamAngle.x));
    officeDragStart = {x:e.clientX, y:e.clientY};
  });
  canvas.addEventListener('wheel', e => {
    // FIX 2026-05-17T19:20Z · OrthographicCamera ignores distance · use camera.zoom + updateProjectionMatrix
    // This is what makes you actually zoom IN/OUT on ortho · previous code just orbited at the same scale
    e.preventDefault();
    userTouchedOfficeCam = true;
    const delta = e.deltaY > 0 ? 0.90 : 1.10;
    officeCamera.zoom = Math.max(0.4, Math.min(10, (officeCamera.zoom || 1) * delta));
    officeCamera.updateProjectionMatrix();
  }, {passive:false});
  // Touch (single-finger orbit · pinch zoom)
  let lastPinch = 0;
  canvas.addEventListener('touchstart', e => {
    if(e.touches.length === 1){ officeDrag = true; officeDragStart = {x:e.touches[0].clientX, y:e.touches[0].clientY}; userTouchedOfficeCam = true; }
    if(e.touches.length === 2){
      const dx = e.touches[0].clientX - e.touches[1].clientX, dy = e.touches[0].clientY - e.touches[1].clientY;
      lastPinch = Math.sqrt(dx*dx + dy*dy);
    }
  }, {passive:true});
  canvas.addEventListener('touchend', () => { officeDrag = false; lastPinch = 0; });
  canvas.addEventListener('touchmove', e => {
    if(e.touches.length === 1 && officeDrag){
      officeCamAngle.y -= (e.touches[0].clientX - officeDragStart.x) * 0.008;
      officeCamAngle.x -= (e.touches[0].clientY - officeDragStart.y) * 0.005;
      officeCamAngle.x = Math.max(0.1, Math.min(Math.PI/2 - 0.05, officeCamAngle.x));
      officeDragStart = {x:e.touches[0].clientX, y:e.touches[0].clientY};
    }
    if(e.touches.length === 2){
      // FIX 2026-05-17T19:20Z · ortho zoom via camera.zoom (same fix as wheel)
      const dx = e.touches[0].clientX - e.touches[1].clientX, dy = e.touches[0].clientY - e.touches[1].clientY;
      const cur = Math.sqrt(dx*dx + dy*dy);
      if(lastPinch > 0){
        const factor = cur / lastPinch;   // > 1 = pinch-out (zoom in) · < 1 = pinch-in (zoom out)
        officeCamera.zoom = Math.max(0.4, Math.min(10, (officeCamera.zoom || 1) * factor));
        officeCamera.updateProjectionMatrix();
      }
      lastPinch = cur;
    }
  }, {passive:true});

  // TRACK B · raycaster on the office scene · click agent torso/head → load dossier + camera focus
  const officeRaycaster = new THREE.Raycaster();
  const officeMouse = new THREE.Vector2();
  let officeClickStart = {x:0,y:0};
  canvas.addEventListener('mousedown', e => { officeClickStart = {x:e.clientX, y:e.clientY}; });
  canvas.addEventListener('click', (e) => {
    if(Math.abs(e.clientX - officeClickStart.x) > 4 || Math.abs(e.clientY - officeClickStart.y) > 4) return;
    const rect = canvas.getBoundingClientRect();
    officeMouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    officeMouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    officeRaycaster.setFromCamera(officeMouse, officeCamera);
    const targets = [];
    officeAgents.forEach(a => { targets.push(a.core); if(a.head) targets.push(a.head); });
    const hits = officeRaycaster.intersectObjects(targets, false);
    if(hits.length){
      let hit = hits[0].object;
      const ag = officeAgents.find(a => a.core === hit || a.head === hit);
      if(ag){
        displayAgentDossier(ag);
        selectedAgent = ag;
        userTouchedOfficeCam = true;
        tweenCameraTo(ag.dx, 1.0, ag.dz + 0.55, 2.4, 700);
      }
    }
  });

  // v4.5.4 · HOVER RAYCASTER (Skill #31 · Visual Hierarchy via Hover Reveal)
  // Mouse moves → cast ray → if hit agent or prop → set that one's label visible · clear all others
  let hoverFrameSkip = 0;
  canvas.addEventListener('mousemove', e => {
    // Throttle to every 3rd frame so we don't choke on mousemove storms
    hoverFrameSkip = (hoverFrameSkip + 1) % 3;
    if (hoverFrameSkip !== 0) return;
    const rect = canvas.getBoundingClientRect();
    const mx = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    const my = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    officeMouse.set(mx, my);
    officeRaycaster.setFromCamera(officeMouse, officeCamera);
    // Build hit-target list · agent cores + heads · also include any break-routine temp humanoid torso
    const hitTargets = [];
    officeAgents.forEach(a => {
      if (a.core && a.bodyGroup && a.bodyGroup.visible) { hitTargets.push(a.core); if (a.head) hitTargets.push(a.head); }
      if (a.breakWorker && a.breakWorker.torso) { hitTargets.push(a.breakWorker.torso); if (a.breakWorker.head) hitTargets.push(a.breakWorker.head); }
    });
    // Also include prop group children (water cooler / coffee / etc.)
    officeProps.forEach(p => { if (p.group) p.group.traverse(o => { if (o.isMesh) hitTargets.push(o); }); });
    const hits = officeRaycaster.intersectObjects(hitTargets, false);
    // Clear all hover states first
    officeAgents.forEach(a => a.hovered = false);
    officePropLabels.forEach(p => p.visible = false);
    canvas.style.cursor = 'default';
    if (hits.length) {
      const hitObj = hits[0].object;
      // Match against agent (seated body OR break worker)
      const ag = officeAgents.find(a => a.core === hitObj || a.head === hitObj ||
        (a.breakWorker && (a.breakWorker.torso === hitObj || a.breakWorker.head === hitObj)));
      if (ag) {
        ag.hovered = true;
        canvas.style.cursor = 'pointer';
      } else {
        // Walk up to find a prop group
        let p = hitObj;
        while (p && !officeProps.find(op => op.group === p)) p = p.parent;
        if (p) {
          const propLabel = officePropLabels.find(pl => pl.group === p);
          if (propLabel) { propLabel.visible = true; canvas.style.cursor = 'pointer'; }
        }
      }
    }
  });
  canvas.addEventListener('mouseleave', () => {
    officeAgents.forEach(a => a.hovered = false);
    officePropLabels.forEach(p => p.visible = false);
    canvas.style.cursor = 'default';
  });
}

// === FLOOR-FLOWING DATA PACKETS (Mo: "make packets flow within the grid on the floor") ===
// Packets now walk the exact L-shaped wire conduit path from each desk → aisle → rack column → server
// Hugging the floor (y=0.08) so they look like data flowing through the corporate network infrastructure
let officeBgPackets = [];

function buildPacketPath(ag, reverse){
  const rackX = -7.5 + (ag.agentIdx % 5) * 3.75;
  const pts = [
    new THREE.Vector3(ag.dx, 0.08, ag.dz + 0.55),  // behind agent's chair
    new THREE.Vector3(ag.dx, 0.08, -3.5),           // straight back to main aisle
    new THREE.Vector3(rackX, 0.08, -3.5),           // sideways along aisle to rack column
    new THREE.Vector3(rackX, 0.08, -8.5)            // into server rack
  ];
  return reverse ? pts.slice().reverse() : pts;
}

function initOfficeBackgroundPackets(){
  officeBgPackets = [];
  if(!officeAgents.length) return;
  const POOL = 36;   // bumped from 22 · denser floor traffic
  const sphereGeo = new THREE.SphereGeometry(0.10, 10, 10);   // slightly bigger for floor visibility
  for(let i = 0; i < POOL; i++){
    const ag = officeAgents[Math.floor(Math.random() * officeAgents.length)];
    const colorChoices = [0x00e4ff, 0x43e6a1, 0xf5c542, 0x00e4ff];  // cyan biased
    const color = colorChoices[Math.floor(Math.random() * colorChoices.length)];
    const mat = new THREE.MeshBasicMaterial({color, transparent: true, opacity: 1, depthTest: false});
    const mesh = new THREE.Mesh(sphereGeo, mat);
    mesh.renderOrder = 800;
    officeScene.add(mesh);
    const reverse = Math.random() < 0.5;
    officeBgPackets.push({
      mesh, agent: ag, color, reverse,
      path: buildPacketPath(ag, reverse),
      progress: Math.random(),
      speed: 0.005 + Math.random()*0.009
    });
  }
}

function animateOfficeBgPackets(){
  officeBgPackets.forEach(p => {
    p.progress += p.speed;
    if(p.progress >= 1){
      // Reroute · fresh random agent · flip direction
      const ag = officeAgents[Math.floor(Math.random() * officeAgents.length)];
      p.agent = ag;
      p.reverse = !p.reverse;
      p.path = buildPacketPath(ag, p.reverse);
      p.progress = 0;
      p.speed = 0.005 + Math.random()*0.009;
    }
    // Walk the multi-segment path · path has 4 points = 3 segments
    const segs = p.path.length - 1;
    const segProgress = p.progress * segs;
    const segIdx = Math.min(segs - 1, Math.floor(segProgress));
    const segT = segProgress - segIdx;
    const from = p.path[segIdx];
    const to = p.path[segIdx + 1];
    p.mesh.position.x = from.x + (to.x - from.x) * segT;
    p.mesh.position.y = from.y + (to.y - from.y) * segT;
    p.mesh.position.z = from.z + (to.z - from.z) * segT;
    // Bright + opacity pulses along the path (fade-in start · full middle · fade-out end)
    p.mesh.material.opacity = 0.5 + 0.5 * Math.sin(Math.PI * p.progress);
  });
}

// Globals for office camera state (referenced by animate loop)
let officeCamRadius = 18, officeCamAngle = {y: Math.PI/4, x: Math.PI/4.2}, officeCamTarget = null, userTouchedOfficeCam = false;

// TRACK A · canvas-texture HUD sprite painter (per Gemini round-6)
function renderAgentLabel(ag){
  // v4.5.1 · DOM label render · clean text · no bloom wash-out · readable at any zoom
  if (!ag.labelDiv) return;
  const stateForLabel = (ag.breakState && ag.breakState !== 'seated') ? 'MOVING' : ag.state;
  const stateColor = stateForLabel === 'PROCESSING' ? '#ffffff'
                   : stateForLabel === 'MOVING'     ? '#f5c542'
                                                    : '#43e6a1';
  const borderColor = stateForLabel === 'PROCESSING' ? '#ffffff' : '#00e4ff';
  ag.labelDiv.style.borderColor = borderColor;
  ag.labelDiv.style.borderLeftColor = borderColor;
  ag.labelDiv.innerHTML =
    `<span style="color:#00e4ff;font-weight:700">[${ag.id}]</span>` +
    `<span style="color:#5a6580;margin:0 6px">|</span>` +
    `<span style="color:#fff;font-weight:600">${escapeHTML(ag.name)}</span>` +
    `<span style="color:#5a6580;margin:0 6px">|</span>` +
    `<span style="color:${stateColor};font-weight:700">${stateForLabel}</span>`;
}
// v4.5.4 · screen-projection updater · ONLY positions+shows labels for HOVERED or SELECTED targets
// Mo: "shouldn't be visible all the time · clean office · only on hover or click"
function updateAgentLabelPositions(){
  if (!officeCamera || !officeRenderer) return;
  const w = officeRenderer.domElement.clientWidth, h = officeRenderer.domElement.clientHeight;
  const tmp = new THREE.Vector3();
  // Agent labels · visible if hovered OR selected (Track B dossier · click-locked)
  officeAgents.forEach(ag => {
    if (!ag.labelDiv || !ag.labelAnchor) return;
    const shouldShow = ag.hovered || (selectedAgent && selectedAgent.id === ag.id);
    if (!shouldShow) {
      ag.labelDiv.style.opacity = '0';
      return;
    }
    tmp.copy(ag.labelAnchor); tmp.project(officeCamera);
    if (tmp.z > 1) { ag.labelDiv.style.opacity = '0'; return; }
    const sx = (tmp.x * 0.5 + 0.5) * w;
    const sy = (-tmp.y * 0.5 + 0.5) * h;
    ag.labelDiv.style.left = sx + 'px';
    ag.labelDiv.style.top  = sy + 'px';
    const fade = Math.max(0.65, 1.0 - Math.max(0, tmp.z) * 0.4);
    ag.labelDiv.style.opacity = fade.toFixed(2);
  });
  // Prop labels · visible ONLY on hover
  officePropLabels.forEach(pl => {
    if (!pl.div || !pl.anchor) return;
    if (!pl.visible) {
      pl.div.style.opacity = '0';
      return;
    }
    tmp.copy(pl.anchor); tmp.project(officeCamera);
    if (tmp.z > 1) { pl.div.style.opacity = '0'; return; }
    const sx = (tmp.x * 0.5 + 0.5) * w;
    const sy = (-tmp.y * 0.5 + 0.5) * h;
    pl.div.style.left = sx + 'px';
    pl.div.style.top  = sy + 'px';
    const fade = Math.max(0.70, 1.0 - Math.max(0, tmp.z) * 0.4);
    pl.div.style.opacity = fade.toFixed(2);
  });
}

// TRACK B · dossier rendering into the right-side panel
let selectedAgent = null;
function displayAgentDossier(ag){
  const el = document.getElementById('dossierContent');
  const stateEl = document.getElementById('dossierState');
  if(!el) return;
  stateEl.textContent = ag.state;
  stateEl.style.color = ag.state === 'PROCESSING' ? 'var(--white)' : 'var(--green)';
  // v4.4.5 · render the full multi-agent pipeline chain so user sees how this dept actually executes
  let pipelineHtml = '';
  const fullPipeline = (currentOfficeAgency && officeAgents[0] && officeAgents[0].pipelineLen)
    ? officeAgents.slice(0, officeAgents[0].pipelineLen).map(a => a.pipelineNode || {id:a.id, role:a.name})
    : [ag.pipelineNode || {id:ag.id, role:ag.name}];
  fullPipeline.forEach((node, idx) => {
    const isMe = (node.id === ag.id);
    const isActive = isMe && ag.state === 'PROCESSING';
    const bg = isActive ? 'rgba(255,255,255,.10)' : (isMe ? 'rgba(0,228,255,.08)' : 'rgba(8,12,24,.4)');
    const bd = isActive ? 'var(--white)' : (isMe ? 'var(--cyan)' : 'var(--line)');
    const arrow = idx < fullPipeline.length - 1
      ? '<div style="text-align:center;color:var(--muted);font-size:11px;margin:1px 0">↓</div>' : '';
    pipelineHtml += `<div style="padding:5px 7px;border-radius:6px;background:${bg};border:1px solid ${bd};margin-bottom:2px">
      <span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--gold)">${node.id}</span>
      <span style="font-size:10.5px;color:${isMe?'var(--white)':'var(--text)'};font-weight:${isMe?'700':'500'}"> · ${escapeHTML(node.role)}</span>
    </div>${arrow}`;
  });
  el.innerHTML = `
    <div style="padding:8px 10px;border-radius:8px;background:rgba(8,12,24,.6);border:1px solid var(--line);margin-bottom:6px">
      <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--white);font-size:13px;letter-spacing:.04em">${escapeHTML(ag.name)}</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--cyan);letter-spacing:.1em;margin-top:2px">${ag.id} · ${escapeHTML(ag.specialty)}</div>
    </div>
    <div style="margin:6px 0"><span style="color:var(--muted)">CAPABILITIES ·</span> ${escapeHTML(ag.capability)}</div>
    <div style="margin:8px 0;padding:6px 8px;border-radius:6px;background:${ag.state==='PROCESSING'?'rgba(255,255,255,.08)':'rgba(67,230,161,.08)'};border:1px solid ${ag.state==='PROCESSING'?'var(--white)':'var(--green)'}">
      <span style="color:var(--muted)">ACTIVE TASK ·</span><br>
      <span style="color:${ag.state==='PROCESSING'?'var(--white)':'var(--green)'};font-weight:600">${escapeHTML(ag.currentTask)}</span>
    </div>
    <div style="margin:10px 0 4px;font-family:'Space Grotesk',sans-serif;font-size:10px;letter-spacing:.12em;color:var(--gold);text-transform:uppercase">⬇ Swarm Pipeline · sovereign input</div>
    ${pipelineHtml}
    <div style="margin-top:6px;font-size:9.5px;color:var(--muted)"><span style="color:var(--gold)">QA</span> 10/10 · <span style="color:var(--gold)">FIDELITY</span> SECURED · <span style="color:var(--gold)">CONTINUITY</span> LOCKED</div>
  `;
}

// TRACK C · file drop targets specific agent (round-5 directive 5)
function setAgentState(ag, state, task){
  ag.state = state;
  if(task !== undefined) ag.currentTask = task;
  renderAgentLabel(ag);
  if(selectedAgent && selectedAgent.id === ag.id) displayAgentDossier(ag);
  // Bright white flash on the core when entering PROCESSING
  if(state === 'PROCESSING'){
    const original = ag.core.material.emissive.getHex();
    ag.core.material.emissive.setHex(0xffffff);
    setTimeout(() => {
      // Slow fade back to category color
      ag.core.material.emissive.setHex(original);
    }, 600);
  }
}

// === SMOOTH ORTHO ZOOM TWEEN · for click-to-focus and other animations ===
let cameraTween = null;
function tweenCameraTo(tx, ty, tz, targetZoom, durationMs){
  if(cameraTween) cancelAnimationFrame(cameraTween);
  const startX = officeCamTarget.x, startY = officeCamTarget.y, startZ = officeCamTarget.z;
  const startZoom = officeCamera.zoom || 1;
  const t0 = performance.now();
  function step(){
    const t = Math.min(1, (performance.now() - t0) / durationMs);
    const e = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;   // ease in-out quad
    officeCamTarget.x = startX + (tx - startX) * e;
    officeCamTarget.y = startY + (ty - startY) * e;
    officeCamTarget.z = startZ + (tz - startZ) * e;
    officeCamera.zoom = startZoom + (targetZoom - startZoom) * e;
    officeCamera.updateProjectionMatrix();
    if(t < 1) cameraTween = requestAnimationFrame(step);
    else cameraTween = null;
  }
  step();
}

// === v4.4.7 · INTER-AGENCY DISPATCH LOOP (Skill #18 · Mo: "fly across macro city grid · gold reply return") ===
// Step 1: outbound packet flies up the office conduit and out the ceiling
// Step 2: cross-fade office OUT → macro city visible
// Step 3: packet flashes from origin building to a same-category destination
// Step 4: destination flashes white
// Step 5: gold return packet flies back to origin
// Step 6: cross-fade BACK into office · update dossier "REPLY SECURED · from <destAgency>"
async function dispatchToAgency(originAgency, targetCat){
  if (dispatchActive) return;
  dispatchActive = true;
  const cat = targetCat || categorize(originAgency.id || originAgency.slug || '');
  const origin = buildings.find(b => b.userData && b.userData.agency && (b.userData.agency.id === originAgency.id || b.userData.agency.slug === originAgency.slug));
  const dest = buildings.find(b => b.userData && b.userData.cat === cat && b.userData.agency && b.userData.agency.id !== originAgency.id && !(b.userData.agency.id||'').startsWith('pad_'));
  if (!origin || !dest) { dispatchActive = false; return; }

  // STEP 1 · outbound packet · climbs the office conduit
  if (officeScene && officeOutboundConduit) {
    const sphere = new THREE.Mesh(
      new THREE.SphereGeometry(0.14, 12, 12),
      new THREE.MeshBasicMaterial({color: 0x00f2fe, transparent:true, opacity:1, depthTest:false})
    );
    sphere.renderOrder = 900;
    officeScene.add(sphere);
    const cpts = officeOutboundConduit;
    await new Promise(res => {
      const t0 = performance.now();
      function step(){
        const t = Math.min(1, (performance.now() - t0) / 700);
        const segs = cpts.length - 1;
        const seg = Math.min(segs - 1, Math.floor(t * segs));
        const sT = t * segs - seg;
        const a = cpts[seg], b = cpts[seg+1];
        sphere.position.set(a.x + (b.x-a.x)*sT, a.y + (b.y-a.y)*sT, a.z + (b.z-a.z)*sT);
        sphere.material.opacity = 1 - t * 0.4;
        if (t < 1) requestAnimationFrame(step); else { sphere.geometry.dispose(); sphere.material.dispose(); officeScene.remove(sphere); res(); }
      }
      step();
    });
  }

  // STEP 2 · cross-fade office OUT (macro grid stays mounted underneath)
  const ov = document.getElementById('officeView');
  ov.style.transition = 'opacity 0.5s ease-out';
  ov.style.opacity = '0';
  await new Promise(r => setTimeout(r, 520));

  // STEP 3 + 4 · macro city packet flight · uses main `scene` + `buildings` array
  if (typeof scene !== 'undefined' && scene && origin && dest) {
    const packet = new THREE.Mesh(
      new THREE.SphereGeometry(0.32, 14, 14),
      new THREE.MeshBasicMaterial({color: 0x00f2fe, transparent:true, opacity:1, depthTest:false})
    );
    packet.renderOrder = 900;
    scene.add(packet);
    const trail = new THREE.Mesh(
      new THREE.SphereGeometry(0.5, 14, 14),
      new THREE.MeshBasicMaterial({color: 0x00f2fe, transparent:true, opacity:0.4, depthTest:false})
    );
    scene.add(trail);
    await new Promise(res => {
      const t0 = performance.now();
      function step(){
        const t = Math.min(1, (performance.now() - t0) / 1300);
        const e = t * t * (3 - 2 * t);   // smoothstep
        const x = origin.position.x + (dest.position.x - origin.position.x) * e;
        const z = origin.position.z + (dest.position.z - origin.position.z) * e;
        // Arc UP over the city · peak at 4 units
        const y = origin.position.y + (dest.position.y - origin.position.y) * e + Math.sin(e * Math.PI) * 4;
        packet.position.set(x, y, z);
        trail.position.set(x, y - 0.05, z);
        trail.material.opacity = 0.35 - t * 0.20;
        if (t < 1) requestAnimationFrame(step); else { res(); }
      }
      step();
    });
    // Destination flashes white briefly
    const destOrigEmissive = dest.material.emissive.getHex();
    const destOrigIntensity = dest.material.emissiveIntensity;
    dest.material.emissive.setHex(0xffffff);
    dest.material.emissiveIntensity = 1.5;
    await new Promise(r => setTimeout(r, 500));

    // STEP 5 · gold return packet
    packet.material.color.setHex(0xf5c542);
    trail.material.color.setHex(0xf5c542);
    await new Promise(res => {
      const t0 = performance.now();
      function step(){
        const t = Math.min(1, (performance.now() - t0) / 1200);
        const e = t * t * (3 - 2 * t);
        const x = dest.position.x + (origin.position.x - dest.position.x) * e;
        const z = dest.position.z + (origin.position.z - dest.position.z) * e;
        const y = dest.position.y + (origin.position.y - dest.position.y) * e + Math.sin(e * Math.PI) * 4;
        packet.position.set(x, y, z);
        trail.position.set(x, y - 0.05, z);
        trail.material.opacity = 0.35 - t * 0.20;
        if (t < 1) requestAnimationFrame(step); else { res(); }
      }
      step();
    });
    // Origin flashes gold briefly
    if (origin.material && origin.material.emissive){
      const oE = origin.material.emissive.getHex();
      origin.material.emissive.setHex(0xf5c542);
      origin.material.emissiveIntensity = 1.4;
      setTimeout(() => { origin.material.emissive.setHex(oE); origin.material.emissiveIntensity = stateEmissive(origin.userData.state); }, 700);
    }
    // Restore destination
    setTimeout(() => { dest.material.emissive.setHex(destOrigEmissive); dest.material.emissiveIntensity = destOrigIntensity; }, 700);
    // Cleanup packet + trail
    setTimeout(() => {
      scene.remove(packet); scene.remove(trail);
      packet.geometry.dispose(); packet.material.dispose();
      trail.geometry.dispose(); trail.material.dispose();
    }, 800);
  }

  await new Promise(r => setTimeout(r, 400));

  // STEP 6 · cross-fade BACK into office · stamp REPLY SECURED on the originating agent's task
  ov.style.opacity = '1';
  await new Promise(r => setTimeout(r, 520));
  const replyText = 'REPLY SECURED · from ' + (dest.userData.agency.name || dest.userData.agency.slug || dest.userData.slug);
  const tgt = (selectedAgent && officeAgents.includes(selectedAgent)) ? selectedAgent : officeAgents[0];
  if (tgt) setAgentState(tgt, 'IDLE', replyText);
  dispatchActive = false;
}

let pendingDropFiles = [];
let officeDropParticles = [];

function setupDropzone(){
  const dz = document.getElementById('dropzone');
  const input = document.getElementById('dropzoneInput');
  if(!dz || !input) return;
  dz.addEventListener('click', () => input.click());
  input.addEventListener('change', e => acceptDropFiles(Array.from(e.target.files || [])));
  ['dragenter','dragover'].forEach(ev => dz.addEventListener(ev, e => {
    e.preventDefault(); e.stopPropagation();
    dz.style.background = 'rgba(245,197,66,.16)'; dz.style.borderColor = 'rgba(245,197,66,.9)';
  }));
  ['dragleave','drop'].forEach(ev => dz.addEventListener(ev, e => {
    e.preventDefault(); e.stopPropagation();
    dz.style.background = 'rgba(245,197,66,.05)'; dz.style.borderColor = 'rgba(245,197,66,.5)';
  }));
  dz.addEventListener('drop', e => {
    const fs = Array.from(e.dataTransfer.files || []);
    acceptDropFiles(fs);
  });
}
function acceptDropFiles(files){
  files.forEach(f => {
    if(f.size > 25 * 1024 * 1024){
      document.getElementById('dropzoneStatus').textContent = '⚠ ' + f.name + ' exceeds 25 MB';
      return;
    }
    pendingDropFiles.push(f);
    triggerDropParticles();
  });
  refreshDropList();
}
function refreshDropList(){
  const el = document.getElementById('dropzoneList');
  if(!el) return;
  el.innerHTML = pendingDropFiles.map((f,i) =>
    `<div style="display:flex;justify-content:space-between;gap:6px;padding:2px 0">▸ ${escapeHTML(f.name)} · ${(f.size/1024).toFixed(1)}KB</div>`
  ).join('');
  const btn = document.getElementById('dropzoneSend');
  btn.disabled = pendingDropFiles.length === 0;
  btn.style.opacity = pendingDropFiles.length === 0 ? '0.5' : '1';
}

function triggerDropParticles(){
  // Round-5 directive 5 · target the SELECTED agent (or first IDLE) · not random
  if(!officeAgents.length) return;
  let tgtAgent = selectedAgent && officeAgents.includes(selectedAgent) ? selectedAgent : null;
  if(!tgtAgent) tgtAgent = officeAgents.find(a => a.state === 'IDLE') || officeAgents[0];
  const target = tgtAgent.core.position;
  const startWorld = new THREE.Vector3(7, 5, 4); // approx world coord of the dropzone panel projected
  const sphereGeo = new THREE.SphereGeometry(0.09, 10, 10);
  for(let i = 0; i < 8; i++){
    const mat = new THREE.MeshBasicMaterial({color:0x43e6a1, transparent:true, opacity:1, depthTest:false});
    const m = new THREE.Mesh(sphereGeo, mat);
    m.renderOrder = 1000;
    m.position.copy(startWorld);
    officeScene.add(m);
    officeDropParticles.push({mesh:m, start: startWorld.clone(), end: target.clone(), progress: -i*0.07, speed: 0.022 + Math.random()*0.008, dead:false});
  }
}
function animateDropParticles(){
  for(let i = officeDropParticles.length - 1; i >= 0; i--){
    const p = officeDropParticles[i];
    if(p.dead){ officeScene.remove(p.mesh); p.mesh.material.dispose(); officeDropParticles.splice(i,1); continue; }
    p.progress += p.speed;
    if(p.progress < 0){ p.mesh.material.opacity = 0; continue; }
    if(p.progress >= 1){ p.dead = true; continue; }
    const t = p.progress;
    p.mesh.position.x = p.start.x + (p.end.x - p.start.x) * t;
    p.mesh.position.z = p.start.z + (p.end.z - p.start.z) * t;
    const arcY = 4 * t * (1 - t);
    p.mesh.position.y = (p.start.y + (p.end.y - p.start.y) * t) + arcY * 1.5;
    p.mesh.material.opacity = (1 - t) * 0.95;
  }
}

          customer_id: new URLSearchParams(window.location.search).get('cid') || '',
          task_note: document.getElementById('dropzoneNote').value || '',
          files_meta: j.received.filter(x => x.ok).map(x => ({name: x.name, size: x.bytes || 0, type: x.type || ''}))
        };
        try {
          const dr = await fetch('/api/customer_dispatch.php', {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify(dispatchPayload)
          });
          const dj = await dr.json();
          if (dj.ok && dj.reply){
            showMayaReplyInDossier(dj);
            status.innerHTML += ` <span style="color:var(--green)">· Maya replied · ${dj.ms}ms</span>`;
          } else {
            showMayaErrorInDossier(dj.error || 'Maya did not respond');
            status.innerHTML += ` <span style="color:var(--gold)">· Maya queue delayed</span>`;
          }
        } catch(de){
          showMayaErrorInDossier('Network error · your files are stored · we will follow up by email');
        }
      }
    } else {
      status.innerHTML = `<span style="color:var(--red)">⚠ ${escapeHTML(j.error || 'upload failed')}</span>`;
    }
  }catch(e){
    status.innerHTML = `<span style="color:var(--red)">⚠ network: ${escapeHTML(e.message || String(e))}</span>`;
  } finally {
    btn.disabled = pendingDropFiles.length === 0; btn.textContent = 'SEND TO AGENCY';
  }
}

// Resize office canvas on window resize
window.addEventListener('resize', () => {
  if(!officeRenderer || !officeCamera) return;
  const stage = document.getElementById('officeStage');
  const w = stage.clientWidth, h = stage.clientHeight, ar = w/h, vs = 9;
  officeCamera.left = -vs*ar; officeCamera.right = vs*ar;
  officeCamera.top = vs; officeCamera.bottom = -vs;
  officeCamera.updateProjectionMatrix();
  officeRenderer.setSize(w, h);
  if (officeComposer) officeComposer.setSize(w, h);
  if (officeBloomPass) officeBloomPass.setSize(w, h);
});

// ============ GEMINI CRAWL LAYER · text mirror of the WebGL scene ============
function updateCrawlerMirror(){
  const el = document.getElementById('crawler-building-list');
  if(!el) return;
  let html = '';
  buildings.forEach((b, i) => {
    if(!b.userData || !b.userData.slug || (b.userData.slug+'').startsWith('pad_')) return;
    if(b.userData.slug === '_council'){
      html += `<li>Council Chamber · gold cylindrical tower with torus ring + steel dome cap · LOCKED at front-center anchor (0, 1.1, ${(-SPACING*(GRID_N/2+1.4)).toFixed(1)}) · 12 canonical seats: Reasoning Lead · Strategic Systems · Architecture · Agentic · Practical · Conversion · Web-aware · Agentic Orchestration · Multilingual Reasoning · Independent Voice · Multimodal Vision (Seat 11 · Skill #15 Vision-Interpreter) · Math + Code Specialist</li>`;
      return;
    }
    const a = b.userData.agency || {};
    html += `<li>Building #${i+1} · ${(a.name||b.userData.slug)} · category: ${b.userData.cat} · roles: ${a.role_count||0} · state: ${b.userData.state||'idle'} · grid (${b.position.x.toFixed(1)}, ${b.position.z.toFixed(1)})</li>`;
  });
  el.innerHTML = html;
  // also bump the scene-state JSON snapshot with live counts
  const snap = document.getElementById('scene-state-snapshot');
  if(snap){
    try{
      const data = JSON.parse(snap.textContent);
      data.live_state = {
        ts: new Date().toISOString(),
        buildings_total: buildings.filter(b => !((b.userData.slug+'').startsWith('pad_')) && b.userData.slug !== '_council').length,
        buildings_working: buildings.filter(b => b.userData.state === 'working').length,
        active_data_packets: dataPackets.length,
        active_burst_particles: burstPool.length,
        council_position: `(${(buildings.find(b => b.userData.slug==='_council')||{position:{}}).position.x||0}, ${(buildings.find(b => b.userData.slug==='_council')||{position:{}}).position.y||0}, ${(buildings.find(b => b.userData.slug==='_council')||{position:{}}).position.z||0})`
      };
      snap.textContent = JSON.stringify(data);
    }catch(e){}
  }
}
// Refresh the crawler mirror every 4 seconds so any crawl-mid-session sees current state
setInterval(updateCrawlerMirror, 4000);
