// ============ BUILD BUILDINGS (10x10 grid · 2-unit spacing · agent recipe (a)) ============
const GRID_N = 10;
const SPACING = 2.2;
const buildings = [];        // {mesh, slug, agency, cat, state, baseColor}
let hoveredBuilding = null;
let workingCount = 0;

async function loadAndBuild(){
  let agencies = [];
  try{
    const r = await fetch('/api/staff.php', {cache:'no-store'});
    const j = await r.json();
    agencies = j.agencies || [];
  }catch(e){ console.warn('staff.php failed', e); }

  // Pad to 100 if needed
  while(agencies.length < GRID_N*GRID_N){
    agencies.push({id:'pad_'+agencies.length, name:'(reserved)', role_count:0, description:'Reserved · district pending'});
  }
  agencies = agencies.slice(0, GRID_N*GRID_N);

  document.getElementById('t_count').textContent = agencies.length;
  document.getElementById('t_roles').textContent = agencies.reduce((s,a)=>s+(a.role_count||0),0);

  // Category counts
  const counts = {tech:0,biz:0,health:0,industry:0,creative:0};
  agencies.forEach(a => { counts[categorize(a.id||a.slug)] += 1; });
  Object.keys(counts).forEach(k => document.getElementById('c_'+k).textContent = counts[k]);

  // Single shared geometry · per-building material for individual emissive (Gemini directive 2)
  const sharedGeometry = new THREE.BoxGeometry(1.2, 1, 1.2);

  // CANVAS-GENERATED WINDOW-GRID TEXTURE · gives boxes the "skyscraper at night" look
  // (Gemini directive 2 · glowing window grids via programmatic emissiveMap)
  function makeWindowTexture(hex){
    const c = document.createElement('canvas');
    c.width = 128; c.height = 128;
    const ctx = c.getContext('2d');
    // Dark obsidian backdrop
    ctx.fillStyle = '#050a18';
    ctx.fillRect(0, 0, 128, 128);
    // Glowing window grid (8 cols × 10 rows · random pattern · per-window flicker via opacity)
    const color = '#' + ('000000' + hex.toString(16)).slice(-6);
    const cols = 8, rows = 10;
    const cellW = 128/cols, cellH = 128/rows;
    for(let r = 0; r < rows; r++){
      for(let cc = 0; cc < cols; cc++){
        const lit = Math.random();
        if(lit > 0.18){  // ~82% windows lit
          ctx.fillStyle = color;
          ctx.globalAlpha = 0.45 + Math.random()*0.55;
          ctx.fillRect(cc*cellW + 2.2, r*cellH + 2.5, cellW - 4.4, cellH - 5);
        }
      }
    }
    ctx.globalAlpha = 1;
    // Thin neon stripes across the top + bottom (rim accents)
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.8;
    ctx.fillRect(0, 0, 128, 2);
    ctx.fillRect(0, 126, 128, 2);
    const tex = new THREE.CanvasTexture(c);
    tex.anisotropy = 4;
    return tex;
  }

  // Pre-bake one window-texture per category color (reuse across all buildings of that category)
  const windowTex = {};
  Object.keys(CAT_COLOR).forEach(k => { windowTex[k] = makeWindowTexture(CAT_COLOR[k]); });

  agencies.forEach((a, i) => {
    const row = Math.floor(i / GRID_N);
    const col = i % GRID_N;
    const x = (col - (GRID_N-1)/2) * SPACING;
    const z = (row - (GRID_N-1)/2) * SPACING;
    const roles = a.role_count || 4;
    const height = 0.7 + (roles / 12) * 3.0;  // 0.7–3.7 units · taller = more roles
    const cat = categorize(a.id||a.slug);
    const baseColor = CAT_COLOR[cat];
    const padding = String(a.id||'').startsWith('pad_');

    // GLASS + STEEL (Gemini blueprint · MeshPhysicalMaterial)
    const mat = new THREE.MeshPhysicalMaterial({
      color: padding ? 0x1a2238 : 0x0f172a,                    // dark base · neon comes from emissiveMap
      emissive: baseColor,
      emissiveMap: padding ? null : windowTex[cat],            // glowing window grid texture
      emissiveIntensity: padding ? 0 : 0.32,
      metalness: 0.9,
      roughness: 0.18,
      clearcoat: 0.6,
      clearcoatRoughness: 0.2,
      transparent: padding,
      opacity: padding ? 0.22 : 1
    });

    const mesh = new THREE.Mesh(sharedGeometry, mat);
    mesh.scale.y = height;
    mesh.position.set(x, height/2, z);
    mesh.castShadow = !padding; mesh.receiveShadow = !padding;
    mesh.userData = {slug:a.id||a.slug, agency:a, cat, baseColor, baseY:height/2, height, state:'idle'};
    scene.add(mesh);
    buildings.push(mesh);

    // METALLIC ROOFTOP CAP with neon-trim border (Gemini directive 2)
    if(!padding){
      const roofGeo = new THREE.BoxGeometry(1.24, 0.07, 1.24);
      const roofMat = new THREE.MeshStandardMaterial({color:0x080d1a, metalness:0.95, roughness:0.25});
      const roof = new THREE.Mesh(roofGeo, roofMat);
      roof.position.set(x, height + 0.04, z);
      roof.castShadow = true;
      scene.add(roof);
      // Neon-trim border on the roof · thin glowing line
      const trimGeo = new THREE.BoxGeometry(1.28, 0.025, 1.28);
      const trimMat = new THREE.MeshBasicMaterial({color: baseColor, transparent:true, opacity:0.85});
      const trim = new THREE.Mesh(trimGeo, trimMat);
      trim.position.set(x, height + 0.085, z);
      scene.add(trim);
    }
  });

  // Council Chamber · LOCKED at anchor (Gemini directive 1 · Z-axis constraint)
  // baseY set explicitly · slug='_council' is whitelisted to ignore raise/lower
  const COUNCIL_ANCHOR = {x:0, y:1.1, z:-SPACING * (GRID_N/2 + 1.4)};
  const chamberGeo = new THREE.CylinderGeometry(1.6, 1.8, 2.2, 24);
  const chamberMat = new THREE.MeshPhysicalMaterial({
    color: 0x2a1f08, emissive: 0xf5c542, emissiveIntensity: 0.55,
    metalness: 0.85, roughness: 0.22, clearcoat: 0.8, clearcoatRoughness: 0.15
  });
  const chamber = new THREE.Mesh(chamberGeo, chamberMat);
  chamber.position.set(COUNCIL_ANCHOR.x, COUNCIL_ANCHOR.y, COUNCIL_ANCHOR.z);
  chamber.castShadow = true; chamber.receiveShadow = true;
  chamber.userData = {slug:'_council', name:'MirzaTech Council Chamber', cat:'council', state:'idle', baseY: COUNCIL_ANCHOR.y, locked:true};
  scene.add(chamber);
  buildings.push(chamber);

  // Council Chamber dome (decorative cap · steel + neon trim)
  const domeGeo = new THREE.SphereGeometry(1.45, 24, 16, 0, Math.PI*2, 0, Math.PI/2);
  const domeMat = new THREE.MeshPhysicalMaterial({color:0x0a0e1a, metalness:0.95, roughness:0.2, clearcoat:1, clearcoatRoughness:0.15});
  const dome = new THREE.Mesh(domeGeo, domeMat);
  dome.position.set(COUNCIL_ANCHOR.x, COUNCIL_ANCHOR.y + 1.1, COUNCIL_ANCHOR.z);
  dome.castShadow = true;
  scene.add(dome);

  // Gold ring around the chamber base · LOCKED at fixed position
  const ringGeo = new THREE.TorusGeometry(2.2, 0.08, 8, 48);
  const ringMat = new THREE.MeshBasicMaterial({color:0xf5c542, transparent:true, opacity:0.9});
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.position.set(COUNCIL_ANCHOR.x, 0.05, COUNCIL_ANCHOR.z);
  ring.rotation.x = -Math.PI/2;
  scene.add(ring);

  // === KINETIC DATA-PACKET TRAFFIC (Gemini directive 3) ===
  // Pool of glowing spheres flowing between random buildings and the Council Chamber
  initDataPackets();
}

// PARTICLE TRAFFIC · GEMINI PERF UPGRADE · THREE.Points (single draw call · 28 vertices)
// (his exact recommendation: "instantiate a lightweight THREE.Points particle system")
const PACKET_POOL_SIZE = 28;
const dataPackets = [];
let dataPacketPoints = null;   // THREE.Points · one draw call
let dataPacketGeo = null;      // shared BufferGeometry

function initDataPackets(){
  // Per-particle state (CPU-side · just numbers)
  for(let i = 0; i < PACKET_POOL_SIZE; i++){
    const sources = buildings.filter(b => b.userData.slug && !b.userData.slug.startsWith('pad_') && b.userData.slug !== '_council');
    if(sources.length === 0) break;
    const src = sources[Math.floor(Math.random() * sources.length)];
    const startPos = src.position.clone();
    startPos.y = src.userData.baseY + src.userData.height/2;
    const endPos = new THREE.Vector3(0, 1.4, -SPACING * (GRID_N/2 + 1.4));
    dataPackets.push({
      startPos, endPos,
      color: new THREE.Color(src.userData.baseColor),
      progress: Math.random(),
      speed: 0.004 + Math.random()*0.006,
      sourceSlug: src.userData.slug
    });
  }
  // BufferGeometry · single draw call (Gemini perf rec)
  const positions = new Float32Array(PACKET_POOL_SIZE * 3);
  const colors = new Float32Array(PACKET_POOL_SIZE * 3);
  for(let i = 0; i < PACKET_POOL_SIZE; i++){
    positions[i*3] = dataPackets[i].startPos.x;
    positions[i*3+1] = dataPackets[i].startPos.y;
    positions[i*3+2] = dataPackets[i].startPos.z;
    colors[i*3] = dataPackets[i].color.r;
    colors[i*3+1] = dataPackets[i].color.g;
    colors[i*3+2] = dataPackets[i].color.b;
  }
  dataPacketGeo = new THREE.BufferGeometry();
  dataPacketGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  dataPacketGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  // FIX 2026-05-17T17:35Z · packets were invisible at 0.22 world-units (~1px on screen)
  // Now: chunky 0.65-unit glowing orbs · depthTest off (renders on top of buildings) · additive blending for hot-light feel
  const mat = new THREE.PointsMaterial({
    size: 0.65, vertexColors: true, transparent: true, opacity: 1.0,
    blending: THREE.AdditiveBlending, depthWrite: false, depthTest: false, sizeAttenuation: true
  });
  dataPacketPoints = new THREE.Points(dataPacketGeo, mat);
  dataPacketPoints.renderOrder = 999;   // draw last · always on top
  scene.add(dataPacketPoints);
}

function reroutePacket(p){
  const sources = buildings.filter(b => b.userData.slug && !b.userData.slug.startsWith('pad_') && b.userData.slug !== '_council');
  if(sources.length === 0) return;
  const src = sources[Math.floor(Math.random() * sources.length)];
  p.startPos = src.position.clone();
  p.startPos.y = src.userData.baseY + src.userData.height/2;
  p.endPos = new THREE.Vector3(0, 1.4, -SPACING * (GRID_N/2 + 1.4));
  p.color = new THREE.Color(src.userData.baseColor);
  p.progress = 0;
  p.speed = 0.004 + Math.random()*0.006;
  p.sourceSlug = src.userData.slug;
}

function animatePackets(){
  if(!dataPacketPoints) return;
  const posAttr = dataPacketGeo.getAttribute('position');
  const colAttr = dataPacketGeo.getAttribute('color');
  dataPackets.forEach((p, i) => {
    p.progress += p.speed;
    if(p.progress >= 1){ reroutePacket(p); }
    const t = Math.max(0, Math.min(1, p.progress));
    const x = p.startPos.x + (p.endPos.x - p.startPos.x) * t;
    const z = p.startPos.z + (p.endPos.z - p.startPos.z) * t;
    const arcY = 4 * t * (1 - t);
    const y = (p.startPos.y + (p.endPos.y - p.startPos.y) * t) + arcY * 1.4;
    posAttr.setXYZ(i, x, y, z);
    colAttr.setXYZ(i, p.color.r, p.color.g, p.color.b);
  });
  posAttr.needsUpdate = true;
  colAttr.needsUpdate = true;
}

// === CLICK BURST (Gemini directive 3 · burst from clicked tower toward Council) ===
const burstPool = [];
function fireClickBurst(srcMesh){
  if(srcMesh.userData.slug === '_council') return;
  const startPos = srcMesh.position.clone();
  startPos.y = srcMesh.userData.baseY + srcMesh.userData.height/2;
  const endPos = new THREE.Vector3(0, 1.4, -SPACING * (GRID_N/2 + 1.4));
  // FIX 2026-05-17T17:35Z · was 0.11 sphere · now 0.22 (4x volume · way more visible)
  const sphereGeo = new THREE.SphereGeometry(0.22, 12, 12);
  for(let i = 0; i < 7; i++){
    const mat = new THREE.MeshBasicMaterial({color:0xffffff, transparent:true, opacity:1, depthTest:false});
    const mesh = new THREE.Mesh(sphereGeo, mat);
    mesh.renderOrder = 1000;
    mesh.position.copy(startPos);
    scene.add(mesh);
    burstPool.push({
      mesh, startPos: startPos.clone(), endPos: endPos.clone(),
      progress: -i * 0.06,
      speed: 0.020 + Math.random()*0.008,
      dead: false
    });
  }
}

function animateBursts(){
  for(let i = burstPool.length - 1; i >= 0; i--){
    const p = burstPool[i];
    if(p.dead){ scene.remove(p.mesh); p.mesh.material.dispose(); burstPool.splice(i, 1); continue; }
    p.progress += p.speed;
    if(p.progress < 0){ p.mesh.material.opacity = 0; continue; }
    if(p.progress >= 1){ p.dead = true; continue; }
    const t = p.progress;
    p.mesh.position.x = p.startPos.x + (p.endPos.x - p.startPos.x) * t;
    p.mesh.position.z = p.startPos.z + (p.endPos.z - p.startPos.z) * t;
    const arcY = 4 * t * (1 - t);
    p.mesh.position.y = (p.startPos.y + (p.endPos.y - p.startPos.y) * t) + arcY * 2.2;
    p.mesh.material.opacity = (1 - t) * 0.95;
  }
}

// ============ INTERACTION · raycaster click + hover (agent recipe (c) optimization: single Raycaster reused) ============
const raycaster = new THREE.Raycaster();
const mouseVec = new THREE.Vector2();
let lastIntersect = null;

stageEl.addEventListener('mousemove', (e) => {
  const rect = renderer.domElement.getBoundingClientRect();
  mouseVec.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouseVec.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  showTooltip(e.clientX, e.clientY);
});

function showTooltip(cx, cy){
  raycaster.setFromCamera(mouseVec, camera);
  const hits = raycaster.intersectObjects(buildings, false);
  const tt = document.getElementById('tooltip');
  if(hits.length){
    const m = hits[0].object;
    if(m.userData.slug && m.userData.slug !== '_pad' && !m.userData.slug.startsWith('pad_')){
      tt.classList.add('on');
      tt.style.left = cx + 'px';
      tt.style.top = cy + 'px';
      if(m.userData.slug === '_council'){
        document.getElementById('tt_name').textContent = '🏛 MirzaTech Council Chamber';
        document.getElementById('tt_meta').innerHTML = `<b>12 SEATS · LIVE</b> · ${m.userData.state.toUpperCase()}`;
      } else {
        const a = m.userData.agency;
        document.getElementById('tt_name').textContent = (a.icon||'🏢') + ' ' + (a.name||m.userData.slug);
        document.getElementById('tt_meta').innerHTML = `<b>${a.role_count||0} roles</b> · ${m.userData.cat} · ${m.userData.state.toUpperCase()}`;
      }
      if(lastIntersect && lastIntersect !== m) lowerBuilding(lastIntersect);
      raiseBuilding(m);
      lastIntersect = m;
      stageEl.style.cursor = 'pointer';
      return;
    }
  }
  tt.classList.remove('on');
  if(lastIntersect){ lowerBuilding(lastIntersect); lastIntersect = null; }
  stageEl.style.cursor = 'grab';
}

function raiseBuilding(m){
  // FIX (Gemini directive 1 · Z-axis constraint): Council Chamber is LOCKED · never raise it
  if(m.userData.slug === '_council') return;
  if(typeof m.userData.baseY !== 'number') m.userData.baseY = m.position.y;  // safety
  m.position.y = m.userData.baseY + 0.4;
  m.material.emissiveIntensity = 0.55;
}
function lowerBuilding(m){
  if(m.userData.slug === '_council') return;  // locked
  if(typeof m.userData.baseY === 'number') m.position.y = m.userData.baseY;
  m.material.emissiveIntensity = stateEmissive(m.userData.state);
}
function stateEmissive(s){ return s==='working'?0.85:s==='council'?0.7:s==='error'?0.6:0.32; }

stageEl.addEventListener('click', (e) => {
  raycaster.setFromCamera(mouseVec, camera);
  const hits = raycaster.intersectObjects(buildings, false);
  if(!hits.length) return;
  const m = hits[0].object;
  if(m.userData.slug === '_council'){
    // GEMINI exact verbatim · re-clamp inside interaction handler · cannot drift on click
    m.position.x = 0; m.position.y = 1.1; m.position.z = -SPACING * (GRID_N/2 + 1.4);
    openCouncil();
    return;
  }
  if(!m.userData.slug || m.userData.slug.startsWith('pad_')) return;
  // Gemini directive 3: fire click burst toward Council
  fireClickBurst(m);
  // Gemini directive 4: mobile camera focus on tapped building
  if(window.innerWidth < 768){ focusCameraOn(m); }
  openAgency(m.userData);
});

// Smooth camera focus on a target building (mobile · Gemini directive 4)
function focusCameraOn(target){
  // Pan the camera target slightly toward the building · keep iso angle locked
  const px = target.position.x, pz = target.position.z;
  const steps = 24;
  let i = 0;
  const startCx = camAngle.y, startCx2 = camAngle.x;
  // We don't move the camera position drastically · we just tilt the lookAt
  // For ortho cam, easier: shift the camera + lookAt by a fraction of the offset
  const cameraOffsetX = px * 0.4, cameraOffsetZ = pz * 0.4;
  function step(){
    if(i++ > steps) return;
    const t = i / steps;
    camera.position.x = camRadius * Math.sin(camAngle.y) * Math.cos(camAngle.x) + cameraOffsetX * t;
    camera.position.z = camRadius * Math.cos(camAngle.y) * Math.cos(camAngle.x) + cameraOffsetZ * t;
    camera.lookAt(cameraOffsetX * t, 0, cameraOffsetZ * t);
    requestAnimationFrame(step);
  }
  step();
}

// ============ STATE PULSE (working/council/error) ============
function setBuildingState(slug, state){
  const m = buildings.find(b => b.userData.slug === slug);
  if(!m) return;
  m.userData.state = state;
  m.material.emissiveIntensity = stateEmissive(state);
  if(state === 'working'){ m.material.emissive.setHex(0xffffff); }
  else if(state === 'council'){ m.material.emissive.setHex(0xf5c542); }
  else if(state === 'error'){ m.material.emissive.setHex(0xff5b6a); }
  else { m.material.emissive.setHex(m.userData.baseColor || 0x00d4ff); }
  workingCount = buildings.filter(b => b.userData.state === 'working').length;
  document.getElementById('t_working').textContent = workingCount;
}

// ============ CAMERA · simple manual orbit (no OrbitControls dep) ============
let camDrag = false, dragStart = {x:0,y:0}, camAngle = {y: Math.PI/4, x: Math.PI/4};
const camRadius = 48;
function updateCamera(){
  camAngle.x = Math.max(0.2, Math.min(Math.PI/2 - 0.05, camAngle.x));
  camera.position.x = camRadius * Math.sin(camAngle.y) * Math.cos(camAngle.x);
  camera.position.y = camRadius * Math.sin(camAngle.x);
  camera.position.z = camRadius * Math.cos(camAngle.y) * Math.cos(camAngle.x);
  camera.lookAt(0, 0, 0);
}

function animate(){
  requestAnimationFrame(animate);
  t += 0.016;
  if(autoRotate){ camAngle.y += 0.003; updateCamera(); }

  // GEMINI BELT-AND-SUSPENDERS · per-frame hard clamp on Council Chamber position
  // (his exact verbatim recommendation: "Force the ring to stay strictly flush with the terrain")
  // Even if something else in code mutates it, this re-anchors every frame · cost: ~negligible
  const _council = buildings.find(b => b.userData && b.userData.slug === '_council');
  if(_council){
    _council.position.x = 0;
    _council.position.y = 1.1;                           // baseY anchor
    _council.position.z = -SPACING * (GRID_N/2 + 1.4);

  // Subtle pulse on 'working' state buildings
  buildings.forEach(b => {
    if(b.userData.state === 'working' && b.userData.slug !== '_council'){
      b.material.emissiveIntensity = 0.65 + 0.35 * Math.sin(t * 4);

}

async function dispatch(slug, cat){
  const m = buildings.find(b => b.userData.slug === slug);
  const taskEl = document.getElementById('task_'+slug);
  const replyEl = document.getElementById('reply_'+slug);
  const metaEl = document.getElementById('meta_'+slug);
  const btn = document.getElementById('btn_'+slug);
  const task = (taskEl.value||'').trim();
  if(!task){ taskEl.focus(); return; }
  btn.disabled = true; btn.textContent = 'Dispatching…'; metaEl.textContent = '· thinking'; replyEl.style.display='none';
  setBuildingState(slug, 'working');
  const distMap = {tech:'k-tools', biz:'k-staffing', health:'k-staffing', industry:'k-staffing', creative:'k-video'};
  const district = distMap[cat] || 'k-staffing';
  const a = m ? m.userData.agency : {};
  const t0 = Date.now();
  try{
    const r = await fetch('/api/hermes_dispatch.php', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({district, task:`[Speaking AS the "${a.name||slug}" staffing agency · ${a.role_count||0} roles · ${a.description||''}] ${task}`})
    });
    const j = await r.json();
    const elapsed = Date.now() - t0;
    if(j.ok){
      replyEl.innerHTML = `<div style="padding:11px 13px;border-radius:9px;background:rgba(8,12,24,.55);border:1px solid var(--line)"><div style="font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--green);letter-spacing:.12em;margin-bottom:5px">▸ MAYA AGENT · ${j.ms||elapsed}ms</div><div style="font-size:12.5px;line-height:1.55;color:var(--text);white-space:pre-wrap">${escapeHTML(j.reply||'(empty)')}</div></div>`;
      metaEl.textContent = `· ${j.ms||elapsed}ms`;
      setBuildingState(slug, 'idle');
    } else {
      replyEl.innerHTML = `<div style="padding:11px 13px;border-radius:9px;background:rgba(40,8,12,.55);border:1px solid var(--red);color:var(--red);font-family:'JetBrains Mono',monospace;font-size:11px">⚠ ${escapeHTML(j.error||'dispatch failed')}</div>`;
      metaEl.textContent = '· error';
      setBuildingState(slug, 'error');
    }
  }catch(e){
    replyEl.innerHTML = `<div style="padding:11px 13px;border-radius:9px;background:rgba(40,8,12,.55);border:1px solid var(--red);color:var(--red);font-family:'JetBrains Mono',monospace;font-size:11px">⚠ ${escapeHTML(e.message||String(e))}</div>`;
    metaEl.textContent = '· error';
    setBuildingState(slug, 'error');
  } finally {
    replyEl.style.display='block';
    btn.disabled=false; btn.textContent='Dispatch';
  }
}

// Builds a low-poly walking humanoid from pure geometry. No glTF · no external models.
// Hierarchical Group so leg/arm anchors rotate from the hip/shoulder joint via sin(time*speed)*amplitude.
function createProceduralHumanoid(accentColor, variantIdx){
  const g = new THREE.Group();
  // 8-color palette · skin tones + clothing
  const shirtPalette = [0x00d4ff, 0x43e6a1, 0xf5c542, 0xa384ff, 0xff5cc4, 0xff8a4c, 0x4cd9ff, 0xc0c0d8];
  const pantsPalette = [0x2a3550, 0x1a2030, 0x3a2540, 0x252535, 0x303048, 0x2a3a3a, 0x1f2a3e, 0x382848];
  const hairPalette  = [0x2a1810, 0x5a3a20, 0x1a1410, 0x8a5520, 0x3a2818, 0x6a4030, 0x4a3018, 0x1f1810];
  const skinPalette  = [0xf5c79a, 0xd4a07a, 0xa67c5a, 0xe5b07a, 0xc99372, 0x8a6240, 0xefc8a0, 0xb98a64];
  const shirt = shirtPalette[variantIdx % shirtPalette.length];
  const pants = pantsPalette[variantIdx % pantsPalette.length];
  const hair  = hairPalette[variantIdx % hairPalette.length];
  const skin  = skinPalette[variantIdx % skinPalette.length];

  const shirtMat = new THREE.MeshPhysicalMaterial({color: shirt, emissive: shirt, emissiveIntensity: 0.18, metalness:0.2, roughness:0.55});
  const pantsMat = new THREE.MeshPhysicalMaterial({color: pants, emissive: shirt, emissiveIntensity: 0.05, metalness:0.3, roughness:0.6});
  const skinMat  = new THREE.MeshPhysicalMaterial({color: skin,  emissive: skin,  emissiveIntensity: 0.08, metalness:0.1, roughness:0.5});
  const hairMat  = new THREE.MeshStandardMaterial({color: hair,  metalness:0.15, roughness:0.85});

  // Torso (shirt) · slightly tapered cylinder
  const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.22, 0.50, 12), shirtMat);
  torso.position.y = 0.95; torso.castShadow = true;
  g.add(torso);

  // Shoulders (broader bar across the top of the torso for silhouette weight)
  const shoulders = new THREE.Mesh(new THREE.BoxGeometry(0.50, 0.10, 0.22), shirtMat);
  shoulders.position.y = 1.20; shoulders.castShadow = true;
  g.add(shoulders);

  // Neck
  const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.07, 0.08, 8), skinMat);
  neck.position.y = 1.30;
  g.add(neck);

  // Head
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.16, 16, 12), skinMat);
  head.position.y = 1.42; head.castShadow = true;
  g.add(head);

  // Hair tuft (squashed dome on top of head)
  const hairTuft = new THREE.Mesh(new THREE.SphereGeometry(0.165, 14, 10), hairMat);
  hairTuft.scale.set(1, 0.45, 1);
  hairTuft.position.y = 1.52;
  g.add(hairTuft);

  // Eyes · 2 tiny dark dots on the head (face)
  const eyeMat = new THREE.MeshBasicMaterial({color: 0x000000});
  const eyeGeom = new THREE.SphereGeometry(0.018, 8, 6);
  const leftEye = new THREE.Mesh(eyeGeom, eyeMat); leftEye.position.set(-0.05, 1.44, 0.14); g.add(leftEye);
  const rightEye = new THREE.Mesh(eyeGeom, eyeMat); rightEye.position.set( 0.05, 1.44, 0.14); g.add(rightEye);

  // Hip anchors (legs swing on rotation.x · pants color)
  const legGeom = new THREE.CylinderGeometry(0.06, 0.05, 0.55, 8);
  const leftLegAnchor = new THREE.Group();
  const leftLeg = new THREE.Mesh(legGeom, pantsMat);
  leftLeg.position.y = -0.275; leftLeg.castShadow = true;
  leftLegAnchor.add(leftLeg);
  // Shoe (a small dark box at the bottom of the leg)
  const shoeGeom = new THREE.BoxGeometry(0.10, 0.05, 0.16);
  const leftShoe = new THREE.Mesh(shoeGeom, new THREE.MeshStandardMaterial({color: 0x101820, metalness:0.4, roughness:0.6}));
  leftShoe.position.set(0, -0.555, 0.02); leftShoe.castShadow = true;
  leftLegAnchor.add(leftShoe);
  leftLegAnchor.position.set(-0.10, 0.65, 0);
  g.add(leftLegAnchor);

  const rightLegAnchor = new THREE.Group();
  const rightLeg = new THREE.Mesh(legGeom, pantsMat);
  rightLeg.position.y = -0.275; rightLeg.castShadow = true;
  rightLegAnchor.add(rightLeg);
  const rightShoe = leftShoe.clone();
  rightShoe.position.set(0, -0.555, 0.02);
  rightLegAnchor.add(rightShoe);
  rightLegAnchor.position.set(0.10, 0.65, 0);
  g.add(rightLegAnchor);

  // Shoulder anchors (arms · shirt color)
  const armGeom = new THREE.CylinderGeometry(0.048, 0.042, 0.45, 8);
  const leftArmAnchor = new THREE.Group();
  const leftArm = new THREE.Mesh(armGeom, shirtMat);
  leftArm.position.y = -0.225; leftArm.castShadow = true;
  leftArmAnchor.add(leftArm);
  // Hand (skin sphere at the end of the arm)
  const handGeom = new THREE.SphereGeometry(0.058, 10, 8);
  const leftHand = new THREE.Mesh(handGeom, skinMat);
  leftHand.position.y = -0.48; leftHand.castShadow = true;
  leftArmAnchor.add(leftHand);
  leftArmAnchor.position.set(-0.25, 1.18, 0);
  g.add(leftArmAnchor);

  const rightArmAnchor = new THREE.Group();
  const rightArm = new THREE.Mesh(armGeom, shirtMat);
  rightArm.position.y = -0.225; rightArm.castShadow = true;
  rightArmAnchor.add(rightArm);
  const rightHand = leftHand.clone();
  rightHand.position.y = -0.48;
  rightArmAnchor.add(rightHand);
  rightArmAnchor.position.set(0.25, 1.18, 0);
  g.add(rightArmAnchor);

  return {mesh: g, head, torso, leftLeg: leftLegAnchor, rightLeg: rightLegAnchor, leftArm: leftArmAnchor, rightArm: rightArmAnchor, shirt, pants, skin, hair, hairTuft};
}

function buildOfficeScene(agency){

  // Clean previous
  if(officeRenderer){
    officeRenderer.dispose(); officeRenderer.domElement.remove();
    if(officeRAF) cancelAnimationFrame(officeRAF);
  }
  // v4.4.7/8 · reset walker registry + props + dispatch state so cross-agency jumps don't leak
  officeWalkers = [];
  officeProps = [];
  officeOutboundConduit = null;
  dispatchActive = false;
  officeScene = new THREE.Scene();
  officeScene.background = new THREE.Color(0x050912);
  officeScene.fog = new THREE.Fog(0x050912, 18, 38);

  const w = stage.clientWidth, h = stage.clientHeight;
  const aspect = w/h;
  const viewSize = 9;
  officeCamera = new THREE.OrthographicCamera(-viewSize*aspect, viewSize*aspect, viewSize, -viewSize, 0.1, 100);
  officeCamera.position.set(14, 12, 14);
  officeCamera.lookAt(0, 0, 0);

  officeRenderer = new THREE.WebGLRenderer({antialias:true});
  officeRenderer.setSize(w, h);
  officeRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  officeRenderer.shadowMap.enabled = true;
  officeRenderer.toneMapping = THREE.ACESFilmicToneMapping;
  officeRenderer.toneMappingExposure = 1.1;
  stage.appendChild(officeRenderer.domElement);

  // === v4.4.5 · CINEMATIC POST-PROCESSING (Mo: "make it bleed light · SimCity glow") ===
  // UnrealBloomPass forces every emissive material (monitors, server LEDs, agent cores, packets)
  // to physically radiate light into the dark slate atmosphere. Falls back to direct render if
  // examples/js failed to load (jsdelivr hiccup) so we never go black.
  officeComposer = null; officeBloomPass = null;
  try {
    if (THREE.EffectComposer && THREE.UnrealBloomPass && THREE.RenderPass) {
      officeComposer = new THREE.EffectComposer(officeRenderer);
      officeComposer.setSize(w, h);
      const renderPass = new THREE.RenderPass(officeScene, officeCamera);
      officeComposer.addPass(renderPass);
      // strength 1.35 · radius 0.55 · threshold 0.18 · tuned for the dark-room neon vibe
      officeBloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(w, h), 1.35, 0.55, 0.18);
      officeComposer.addPass(officeBloomPass);
    }
  } catch (e) {
    console.warn('UnrealBloom init failed · falling back to direct render', e);
    officeComposer = null;
  }

  // FIX 2026-05-17T19:10Z · init camera state BEFORE animate loop starts (was null on first frame · TypeError on lookAt)
  officeCamRadius = 18;
  officeCamAngle = {y: Math.PI/4, x: Math.PI/4.2};

  userTouchedOfficeCam = false;

  // Lighting
  officeScene.add(new THREE.AmbientLight(0x404560, 0.6));
  const sun = new THREE.DirectionalLight(0xfff5e0, 0.9);
  sun.position.set(8, 18, 6); sun.castShadow = true;
  officeScene.add(sun);
  const rim = new THREE.PointLight(0x00e4ff, 0.6, 30);
  rim.position.set(-8, 6, -8);
  officeScene.add(rim);

  // Get category color for the agency · drives accent lighting

  const accent = CAT_COLOR[cat] || 0x00e4ff;
  const accentRim = new THREE.PointLight(accent, 0.7, 25);

  // FLOOR · dark slate

      variantIdx,

  });

  // === v4.4.7 · OUTBOUND CONDUIT (ceiling-mounted pipe out of the room toward macro city) ===
  // Visible pipe runs from the server rack area up the back wall and through the ceiling
  // Used when dispatchToAgency() fires the inter-agency packet
  const conduitPts = [
    new THREE.Vector3(0, 1.2, -8.5),    // start at server rack top
    new THREE.Vector3(0, 4.5, -8.5),    // climb the back wall
    new THREE.Vector3(0, 4.8, -4),      // run along the ceiling
    new THREE.Vector3(0, 5.0, 0)        // exit point near ceiling center
  ];
  const conduitGeo = new THREE.BufferGeometry().setFromPoints(conduitPts);
  const conduitLine = new THREE.Line(conduitGeo, new THREE.LineBasicMaterial({color: 0x00f2fe, transparent:true, opacity:0.6, linewidth:2}));
  officeScene.add(conduitLine);
  officeOutboundConduit = conduitPts;   // remembered for dispatch packet

  // Title
  document.getElementById('officeTitle').textContent = '🏢 ' + (agency.name || agency.id || agency.slug) + ' · INTERIOR · ' + (agency.role_count||0) + ' STATIONS';
  currentOfficeAgency = agency;

  // INTER-DESK DATA PACKET TRAFFIC (constant flow · so room never feels static)
  initOfficeBackgroundPackets();

  // Animate (round-5 + dual-track + round-7 humanoid)
  let oT = 0;
  function officeAnimate(){
    officeRAF = requestAnimationFrame(officeAnimate);
    oT += 0.016;
    const now = Date.now();
    // Per-agent: torso emissive pulse · head emissive pulse · breathing motion · inner octahedron spin · ring rotation
    officeAgents.forEach(ag => {
      const baseE = ag.state === 'PROCESSING' ? 1.0 : 0.5;
      const pulseE = baseE + 0.25 * Math.sin(oT * (ag.state === 'PROCESSING' ? 7 : 1.8) + ag.phase);
      ag.core.material.emissiveIntensity = pulseE;             // torso
      if(ag.head) ag.head.material.emissiveIntensity = 0.65 + 0.2 * Math.sin(oT * 1.5 + ag.phase);
      // Subtle breathing motion · whole body group rises/falls 0.025 units
      if(ag.bodyGroup) ag.bodyGroup.position.y = Math.sin(oT * 1.2 + ag.phase) * 0.025;
      // Inner octahedron · spin
      ag.innerCore.rotation.y += 0.025;
      ag.innerCore.rotation.x += 0.014;
      // Ring spin
      ag.ring.rotation.z = oT * 0.6 + ag.phase;
      // v4.4.5 · status beacon · pulses green on IDLE, white on PROCESSING, amber on WARN
      if (ag.beacon) {
        const beaconColor = ag.state === 'PROCESSING' ? 0xffffff
                          : ag.state === 'WARN' ? 0xf5c542
                          : 0x43e6a1;
        ag.beacon.material.color.setHex(beaconColor);
        const beaconPulse = ag.state === 'PROCESSING' ? 7 : 2.2;
        ag.beacon.material.opacity = 0.45 + 0.5 * Math.abs(Math.sin(oT * beaconPulse + ag.phase));
        ag.beacon.scale.setScalar(1 + 0.15 * Math.sin(oT * beaconPulse + ag.phase));
      }
    });
    // Server LED flicker
    officeServerLEDs.forEach(L => {
      L.phase -= 1;
      if(L.phase <= 0){
        L.phase = 8 + Math.random()*40;
        const r = Math.random();
        const c = r < 0.7 ? 0x22c55e : (r < 0.92 ? 0xeab308 : 0xef4444);
        L.mesh.material.color.setHex(c);
        L.mesh.material.opacity = 0.6 + Math.random()*0.4;
      }
    });
    // CONSTANT BACKGROUND DATA PACKETS · flowing through the wire conduits
    if(officeBgPackets.length) animateOfficeBgPackets();
    // v4.4.8 · PURPOSEFUL NPC STATE MACHINE (Skill #20)
    // States: walking → dwelling → walking → dwelling ... → home → walking → ...
    // Each worker visits 2-3 props then "returns home" (their starting corner) for a short rest
    officeWalkers.forEach(w => {
      if (w.state === 'walking' && w.target) {
        const dx = w.target.x - w.mesh.position.x;
        const dz = w.target.z - w.mesh.position.z;
        const dist = Math.sqrt(dx*dx + dz*dz);
        if (dist < 0.30) {
          // Arrived · enter dwelling
          w.state = 'dwelling';
          w.dwellEnd = Date.now() + w.target.dwellMs;
          w.currentActivity = '⌂ ' + (w.target.name || 'doing task');
          // Park legs/arms at rest
          w.leftLeg.rotation.x = 0; w.rightLeg.rotation.x = 0;
          w.leftArm.rotation.x = 0; w.rightArm.rotation.x = 0;
        } else {
          // Move toward target · normalized direction × speed
          const nx = dx / dist, nz = dz / dist;
          w.mesh.position.x += nx * w.speed;
          w.mesh.position.z += nz * w.speed;
          // Face direction of travel
          w.mesh.rotation.y = Math.atan2(nx, nz);
          // Walk cycle · sin(time*speed)*amplitude (Skill #16)
          const t = oT * 4.5 + w.phase;
          const swing = Math.sin(t) * 0.55;
          w.leftLeg.rotation.x  =  swing;
          w.rightLeg.rotation.x = -swing;
          w.leftArm.rotation.x  = -swing * 0.7;
          w.rightArm.rotation.x =  swing * 0.7;
          w.mesh.position.y = Math.abs(Math.cos(t)) * 0.06;
          if (w.head) w.head.position.y = 1.42 + Math.sin(t * 2) * 0.012;
        }
      } else if (w.state === 'dwelling') {
        // Idle sway · subtle weight-shift while at the prop
        w.mesh.position.y = Math.sin(oT * 1.3 + w.phase) * 0.012;
        w.leftLeg.rotation.x  = Math.sin(oT * 0.4 + w.phase) * 0.04;
        w.rightLeg.rotation.x = Math.sin(oT * 0.4 + w.phase + Math.PI) * 0.04;
        // Tiny arm gesture · sin-driven · gives life
        w.leftArm.rotation.x  = Math.sin(oT * 0.6 + w.phase) * 0.10;
        w.rightArm.rotation.x = Math.cos(oT * 0.5 + w.phase) * 0.08;
        // Time to leave?
        if (Date.now() >= w.dwellEnd) {
          w.visitsBeforeHome -= 1;
          if (w.visitsBeforeHome <= 0) {
            // Return home for a longer rest
            w.target = {x: w.homeX, z: w.homeZ, dwellMs: 4000 + Math.random()*2000, name: 'home corner'};
            w.visitsBeforeHome = 2 + Math.floor(Math.random()*2);
            w.currentActivity = '↺ returning to ' + w.target.name;
          } else {
            // Pick a new prop (different from current location to keep motion meaningful)
            let nextProp;
            for (let tries = 0; tries < 6; tries++){
              nextProp = officeProps[Math.floor(Math.random() * officeProps.length)];
              if (Math.abs(nextProp.x - w.mesh.position.x) + Math.abs(nextProp.z - w.mesh.position.z) > 2.0) break;
            }
            w.target = {x: nextProp.x, z: nextProp.z, dwellMs: nextProp.dwellMs, name: nextProp.name};
            w.currentActivity = '→ heading to ' + nextProp.name;
          }
          w.state = 'walking';
        }
      }
    });
    // File-drop particles
    if(officeDropParticles.length) animateDropParticles();
    // User-controlled camera (orbit + zoom · NO auto-drift while user has touched it · per Mo's "zoom further" need)
    if(!userTouchedOfficeCam){
      // Gentle drift before user takes control
      officeCamera.position.x = officeCamRadius * Math.sin(officeCamAngle.y) * Math.cos(officeCamAngle.x) + Math.sin(oT * 0.12) * 0.5;
      officeCamera.position.y = officeCamRadius * Math.sin(officeCamAngle.x);
      officeCamera.position.z = officeCamRadius * Math.cos(officeCamAngle.y) * Math.cos(officeCamAngle.x) + Math.cos(oT * 0.12) * 0.5;
    } else {
      officeCamera.position.x = officeCamRadius * Math.sin(officeCamAngle.y) * Math.cos(officeCamAngle.x);
      officeCamera.position.y = officeCamRadius * Math.sin(officeCamAngle.x);
      officeCamera.position.z = officeCamRadius * Math.cos(officeCamAngle.y) * Math.cos(officeCamAngle.x);
    }
    officeCamera.lookAt(officeCamTarget.x, officeCamTarget.y, officeCamTarget.z);
    // v4.4.5 · route through bloom composer when available · fall back to direct render
    if (officeComposer) officeComposer.render();
    else officeRenderer.render(officeScene, officeCamera);
  }
  officeAnimate();

  // === USER CAMERA CONTROLS (per Mo "I need to be able to zoom in further") ===
  // (camera state already initialized at top of buildOfficeScene · per init-order fix 2026-05-17T19:10Z)
  let officeDrag = false, officeDragStart = {x:0,y:0};
  const canvas = officeRenderer.domElement;

  canvas.addEventListener('mousedown', e => { officeDrag = true; officeDragStart = {x:e.clientX, y:e.clientY}; userTouchedOfficeCam = true; });
  window.addEventListener('mouseup', () => { officeDrag = false; });
  window.addEventListener('mousemove', e => {
    if(!officeDrag || !officeRenderer) return;
    officeCamAngle.y -= (e.clientX - officeDragStart.x) * 0.008;
    officeCamAngle.x -= (e.clientY - officeDragStart.y) * 0.005;
    officeCamAngle.x = Math.max(0.1, Math.min(Math.PI/2 - 0.05, officeCamAngle.x));
    officeDragStart = {x:e.clientX, y:e.clientY};
  });
  canvas.addEventListener('wheel', e => {
    // FIX 2026-05-17T19:20Z · OrthographicCamera ignores distance · use camera.zoom + updateProjectionMatrix
    // This is what makes you actually zoom IN/OUT on ortho · previous code just orbited at the same scale
    e.preventDefault();
    userTouchedOfficeCam = true;
    const delta = e.deltaY > 0 ? 0.90 : 1.10;
    officeCamera.zoom = Math.max(0.4, Math.min(10, (officeCamera.zoom || 1) * delta));
    officeCamera.updateProjectionMatrix();
  }, {passive:false});
  // Touch (single-finger orbit · pinch zoom)
  let lastPinch = 0;
  canvas.addEventListener('touchstart', e => {
    if(e.touches.length === 1){ officeDrag = true; officeDragStart = {x:e.touches[0].clientX, y:e.touches[0].clientY}; userTouchedOfficeCam = true; }
    if(e.touches.length === 2){
      const dx = e.touches[0].clientX - e.touches[1].clientX, dy = e.touches[0].clientY - e.touches[1].clientY;
      lastPinch = Math.sqrt(dx*dx + dy*dy);
    }
  }, {passive:true});
  canvas.addEventListener('touchend', () => { officeDrag = false; lastPinch = 0; });
  canvas.addEventListener('touchmove', e => {
    if(e.touches.length === 1 && officeDrag){
      officeCamAngle.y -= (e.touches[0].clientX - officeDragStart.x) * 0.008;
      officeCamAngle.x -= (e.touches[0].clientY - officeDragStart.y) * 0.005;
      officeCamAngle.x = Math.max(0.1, Math.min(Math.PI/2 - 0.05, officeCamAngle.x));
      officeDragStart = {x:e.touches[0].clientX, y:e.touches[0].clientY};
    }
    if(e.touches.length === 2){
      // FIX 2026-05-17T19:20Z · ortho zoom via camera.zoom (same fix as wheel)
      const dx = e.touches[0].clientX - e.touches[1].clientX, dy = e.touches[0].clientY - e.touches[1].clientY;
      const cur = Math.sqrt(dx*dx + dy*dy);
      if(lastPinch > 0){
        const factor = cur / lastPinch;   // > 1 = pinch-out (zoom in) · < 1 = pinch-in (zoom out)
        officeCamera.zoom = Math.max(0.4, Math.min(10, (officeCamera.zoom || 1) * factor));
        officeCamera.updateProjectionMatrix();
      }
      lastPinch = cur;
    }
  }, {passive:true});

  // TRACK B · raycaster on the office scene · click agent torso/head → load dossier + camera focus
  const officeRaycaster = new THREE.Raycaster();
  const officeMouse = new THREE.Vector2();
  let officeClickStart = {x:0,y:0};
  canvas.addEventListener('mousedown', e => { officeClickStart = {x:e.clientX, y:e.clientY}; });
  canvas.addEventListener('click', (e) => {
    // Only treat as click if mouse didn't move much (otherwise it's a drag)
    if(Math.abs(e.clientX - officeClickStart.x) > 4 || Math.abs(e.clientY - officeClickStart.y) > 4) return;
    const rect = canvas.getBoundingClientRect();
    officeMouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    officeMouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    officeRaycaster.setFromCamera(officeMouse, officeCamera);
    // Hit-test torsos AND heads (both clickable for agent selection)
    const targets = [];
    officeAgents.forEach(a => { targets.push(a.core); if(a.head) targets.push(a.head); });
    const hits = officeRaycaster.intersectObjects(targets, false);
    if(hits.length){
      // Walk up to find the agent
      let hit = hits[0].object;
      const ag = officeAgents.find(a => a.core === hit || a.head === hit);
      if(ag){
        displayAgentDossier(ag);
        selectedAgent = ag;
        userTouchedOfficeCam = true;
        // Smooth camera fly-to (lerp target + zoom in) over ~700ms
        tweenCameraTo(ag.dx, 1.0, ag.dz + 0.55, 2.4, 700);
      }
    }
  });
}

// === FLOOR-FLOWING DATA PACKETS (Mo: "make packets flow within the grid on the floor") ===
// Packets now walk the exact L-shaped wire conduit path from each desk → aisle → rack column → server
// Hugging the floor (y=0.08) so they look like data flowing through the corporate network infrastructure
let officeBgPackets = [];

function buildPacketPath(ag, reverse){
  const rackX = -7.5 + (ag.agentIdx % 5) * 3.75;
  const pts = [
    new THREE.Vector3(ag.dx, 0.08, ag.dz + 0.55),  // behind agent's chair
    new THREE.Vector3(ag.dx, 0.08, -3.5),           // straight back to main aisle
    new THREE.Vector3(rackX, 0.08, -3.5),           // sideways along aisle to rack column
    new THREE.Vector3(rackX, 0.08, -8.5)            // into server rack
  ];
  return reverse ? pts.slice().reverse() : pts;
}

function initOfficeBackgroundPackets(){
  officeBgPackets = [];
  if(!officeAgents.length) return;
  const POOL = 36;   // bumped from 22 · denser floor traffic
  const sphereGeo = new THREE.SphereGeometry(0.10, 10, 10);   // slightly bigger for floor visibility
  for(let i = 0; i < POOL; i++){
    const ag = officeAgents[Math.floor(Math.random() * officeAgents.length)];
    const colorChoices = [0x00e4ff, 0x43e6a1, 0xf5c542, 0x00e4ff];  // cyan biased
    const color = colorChoices[Math.floor(Math.random() * colorChoices.length)];
    const mat = new THREE.MeshBasicMaterial({color, transparent: true, opacity: 1, depthTest: false});
    const mesh = new THREE.Mesh(sphereGeo, mat);
    mesh.renderOrder = 800;
    officeScene.add(mesh);
    const reverse = Math.random() < 0.5;
    officeBgPackets.push({
      mesh, agent: ag, color, reverse,
      path: buildPacketPath(ag, reverse),
      progress: Math.random(),
      speed: 0.005 + Math.random()*0.009
    });
  }
}

function animateOfficeBgPackets(){
  officeBgPackets.forEach(p => {
    p.progress += p.speed;
    if(p.progress >= 1){
      // Reroute · fresh random agent · flip direction
      const ag = officeAgents[Math.floor(Math.random() * officeAgents.length)];
      p.agent = ag;
      p.reverse = !p.reverse;
      p.path = buildPacketPath(ag, p.reverse);
      p.progress = 0;
      p.speed = 0.005 + Math.random()*0.009;
    }
    // Walk the multi-segment path · path has 4 points = 3 segments
    const segs = p.path.length - 1;
    const segProgress = p.progress * segs;
    const segIdx = Math.min(segs - 1, Math.floor(segProgress));
    const segT = segProgress - segIdx;
    const from = p.path[segIdx];
    const to = p.path[segIdx + 1];
    p.mesh.position.x = from.x + (to.x - from.x) * segT;
    p.mesh.position.y = from.y + (to.y - from.y) * segT;
    p.mesh.position.z = from.z + (to.z - from.z) * segT;
    // Bright + opacity pulses along the path (fade-in start · full middle · fade-out end)
    p.mesh.material.opacity = 0.5 + 0.5 * Math.sin(Math.PI * p.progress);
  });
}

// Globals for office camera state (referenced by animate loop)
let officeCamRadius = 18, officeCamAngle = {y: Math.PI/4, x: Math.PI/4.2}, officeCamTarget = null, userTouchedOfficeCam = false;

// TRACK A · canvas-texture HUD sprite painter (per Gemini round-6)
function renderAgentLabel(ag){
  const c = ag.labelCanvas;
  const ctx = c.getContext('2d');
  const w = c.width, h = c.height;
  ctx.clearRect(0, 0, w, h);
  // Obsidian glass background
  ctx.fillStyle = 'rgba(15, 23, 42, 0.92)';
  ctx.fillRect(0, 0, w, h);
  // Border · color by state
  const border = ag.state === 'PROCESSING' ? '#ffffff' : '#00e4ff';
  ctx.strokeStyle = border;
  ctx.lineWidth = 2.5;
  ctx.strokeRect(1, 1, w-2, h-2);

  // ID + role · auto-shrink font so longer pipeline names ("Engine Automation Script") fit
  const idStr = `[${ag.id}] ${ag.name}`;
  let fontSize = 22;
  ctx.font = `bold ${fontSize}px monospace`;
  while (ctx.measureText(idStr).width > w - 16 && fontSize > 11) {
    fontSize -= 1;
    ctx.font = `bold ${fontSize}px monospace`;
  }
  ctx.fillStyle = '#ffffff';
  ctx.fillText(idStr, 10, 28);

  // Status line
  ctx.font = 'bold 14px monospace';
  ctx.fillStyle = ag.state === 'PROCESSING' ? '#ffffff' : '#43e6a1';
  ctx.fillText(`STATUS: ${ag.state}`, 10, 52);

  // Current task · also auto-truncate-with-ellipsis on the wider canvas
  ctx.fillStyle = '#9bb0d4';
  ctx.font = '12px monospace';
  let task = (ag.currentTask || '');
  while (ctx.measureText(task).width > w - 16 && task.length > 4) task = task.slice(0, -1);
  if (task.length < (ag.currentTask || '').length) task = task.slice(0, -1) + '…';
  ctx.fillText(task, 10, 76);

  ag.lblTex.needsUpdate = true;
}

// TRACK B · dossier rendering into the right-side panel
let selectedAgent = null;
function displayAgentDossier(ag){
  const el = document.getElementById('dossierContent');
  const stateEl = document.getElementById('dossierState');
  if(!el) return;
  stateEl.textContent = ag.state;
  stateEl.style.color = ag.state === 'PROCESSING' ? 'var(--white)' : 'var(--green)';

  let pipelineHtml = '';
  const fullPipeline = (currentOfficeAgency && officeAgents[0] && officeAgents[0].pipelineLen)
    ? officeAgents.slice(0, officeAgents[0].pipelineLen).map(a => a.pipelineNode || {id:a.id, role:a.name})
    : [ag.pipelineNode || {id:ag.id, role:ag.name}];
  fullPipeline.forEach((node, idx) => {
    const isMe = (node.id === ag.id);
    const isActive = isMe && ag.state === 'PROCESSING';
    const bg = isActive ? 'rgba(255,255,255,.10)' : (isMe ? 'rgba(0,228,255,.08)' : 'rgba(8,12,24,.4)');
    const bd = isActive ? 'var(--white)' : (isMe ? 'var(--cyan)' : 'var(--line)');
    const arrow = idx < fullPipeline.length - 1
      ? '<div style="text-align:center;color:var(--muted);font-size:11px;margin:1px 0">↓</div>' : '';
    pipelineHtml += `<div style="padding:5px 7px;border-radius:6px;background:${bg};border:1px solid ${bd};margin-bottom:2px">
      <span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--gold)">${node.id}</span>
      <span style="font-size:10.5px;color:${isMe?'var(--white)':'var(--text)'};font-weight:${isMe?'700':'500'}"> · ${escapeHTML(node.role)}</span>
    </div>${arrow}`;
  });
  el.innerHTML = `
    <div style="padding:8px 10px;border-radius:8px;background:rgba(8,12,24,.6);border:1px solid var(--line);margin-bottom:6px">
      <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--white);font-size:13px;letter-spacing:.04em">${escapeHTML(ag.name)}</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--cyan);letter-spacing:.1em;margin-top:2px">${ag.id} · ${escapeHTML(ag.specialty)}</div>
    </div>
    <div style="margin:6px 0"><span style="color:var(--muted)">CAPABILITIES ·</span> ${escapeHTML(ag.capability)}</div>
    <div style="margin:8px 0;padding:6px 8px;border-radius:6px;background:${ag.state==='PROCESSING'?'rgba(255,255,255,.08)':'rgba(67,230,161,.08)'};border:1px solid ${ag.state==='PROCESSING'?'var(--white)':'var(--green)'}">
      <span style="color:var(--muted)">ACTIVE TASK ·</span><br>
      <span style="color:${ag.state==='PROCESSING'?'var(--white)':'var(--green)'};font-weight:600">${escapeHTML(ag.currentTask)}</span>
    </div>
    <div style="margin:10px 0 4px;font-family:'Space Grotesk',sans-serif;font-size:10px;letter-spacing:.12em;color:var(--gold);text-transform:uppercase">⬇ Swarm Pipeline · sovereign input</div>
    ${pipelineHtml}
    <div style="margin-top:6px;font-size:9.5px;color:var(--muted)"><span style="color:var(--gold)">QA</span> 10/10 · <span style="color:var(--gold)">FIDELITY</span> SECURED · <span style="color:var(--gold)">CONTINUITY</span> LOCKED</div>
  `;
}

// TRACK C · file drop targets specific agent (round-5 directive 5)
function setAgentState(ag, state, task){
  ag.state = state;
  if(task !== undefined) ag.currentTask = task;
  renderAgentLabel(ag);
  if(selectedAgent && selectedAgent.id === ag.id) displayAgentDossier(ag);
  // Bright white flash on the core when entering PROCESSING
  if(state === 'PROCESSING'){
    const original = ag.core.material.emissive.getHex();
    ag.core.material.emissive.setHex(0xffffff);
    setTimeout(() => {
      // Slow fade back to category color
      ag.core.material.emissive.setHex(original);
    }, 600);
  }
}

// === SMOOTH ORTHO ZOOM TWEEN · for click-to-focus and other animations ===
let cameraTween = null;
function tweenCameraTo(tx, ty, tz, targetZoom, durationMs){
  if(cameraTween) cancelAnimationFrame(cameraTween);
  const startX = officeCamTarget.x, startY = officeCamTarget.y, startZ = officeCamTarget.z;
  const startZoom = officeCamera.zoom || 1;
  const t0 = performance.now();
  function step(){
    const t = Math.min(1, (performance.now() - t0) / durationMs);
    const e = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;   // ease in-out quad
    officeCamTarget.x = startX + (tx - startX) * e;
    officeCamTarget.y = startY + (ty - startY) * e;
    officeCamTarget.z = startZ + (tz - startZ) * e;
    officeCamera.zoom = startZoom + (targetZoom - startZoom) * e;
    officeCamera.updateProjectionMatrix();
    if(t < 1) cameraTween = requestAnimationFrame(step);
    else cameraTween = null;
  }
  step();
}

function enterOffice(slug){
  const b = buildings.find(x => x.userData && x.userData.slug === slug);
  const a = b && b.userData && b.userData.agency;
  if(!a){ console.warn('enterOffice: no agency for slug', slug); return; }

  // === MACRO-TO-MICRO CINEMATIC DIVE (Mo: "I need that Macro to Micro zoom again") ===
  // 1. Flash the building white briefly (selection feedback)
  if(b.userData.baseColor !== undefined){
    const origEmissive = b.material.emissive.getHex();
    b.material.emissive.setHex(0xffffff);
    b.material.emissiveIntensity = 1.0;
    setTimeout(() => { b.material.emissive.setHex(origEmissive); b.material.emissiveIntensity = stateEmissive(b.userData.state); }, 600);
  }
  // 2. Close overlay
  closeOverlay();
  // 3. Reveal office view with cross-fade from black + start office camera zoomed-OUT, then zoom IN to default
  const ov = document.getElementById('officeView');
  ov.style.display = 'block';
  ov.style.opacity = '0';
  ov.style.transition = 'opacity 0.5s ease-out';
  requestAnimationFrame(() => { ov.style.opacity = '1'; });
  // Use rAF + small timeout to ensure layout has computed (stage.clientWidth was 0 sometimes)
  setTimeout(() => {
    try {
      buildOfficeScene(a);

// === v4.4.7 · INTER-AGENCY DISPATCH LOOP (Skill #18 · Mo: "fly across macro city grid · gold reply return") ===
// Step 1: outbound packet flies up the office conduit and out the ceiling
// Step 2: cross-fade office OUT → macro city visible
// Step 3: packet flashes from origin building to a same-category destination
// Step 4: destination flashes white
// Step 5: gold return packet flies back to origin
// Step 6: cross-fade BACK into office · update dossier "REPLY SECURED · from <destAgency>"
async function dispatchToAgency(originAgency, targetCat){
  if (dispatchActive) return;
  dispatchActive = true;
  const cat = targetCat || categorize(originAgency.id || originAgency.slug || '');
  const origin = buildings.find(b => b.userData && b.userData.agency && (b.userData.agency.id === originAgency.id || b.userData.agency.slug === originAgency.slug));
  const dest = buildings.find(b => b.userData && b.userData.cat === cat && b.userData.agency && b.userData.agency.id !== originAgency.id && !(b.userData.agency.id||'').startsWith('pad_'));
  if (!origin || !dest) { dispatchActive = false; return; }

  // STEP 1 · outbound packet · climbs the office conduit
  if (officeScene && officeOutboundConduit) {
    const sphere = new THREE.Mesh(
      new THREE.SphereGeometry(0.14, 12, 12),
      new THREE.MeshBasicMaterial({color: 0x00f2fe, transparent:true, opacity:1, depthTest:false})
    );
    sphere.renderOrder = 900;
    officeScene.add(sphere);
    const cpts = officeOutboundConduit;
    await new Promise(res => {
      const t0 = performance.now();
      function step(){
        const t = Math.min(1, (performance.now() - t0) / 700);
        const segs = cpts.length - 1;
        const seg = Math.min(segs - 1, Math.floor(t * segs));
        const sT = t * segs - seg;
        const a = cpts[seg], b = cpts[seg+1];
        sphere.position.set(a.x + (b.x-a.x)*sT, a.y + (b.y-a.y)*sT, a.z + (b.z-a.z)*sT);
        sphere.material.opacity = 1 - t * 0.4;
        if (t < 1) requestAnimationFrame(step); else { sphere.geometry.dispose(); sphere.material.dispose(); officeScene.remove(sphere); res(); }
      }
      step();
    });
  }

  // STEP 2 · cross-fade office OUT (macro grid stays mounted underneath)
  const ov = document.getElementById('officeView');
  ov.style.transition = 'opacity 0.5s ease-out';
  ov.style.opacity = '0';
  await new Promise(r => setTimeout(r, 520));

  // STEP 3 + 4 · macro city packet flight · uses main `scene` + `buildings` array
  if (typeof scene !== 'undefined' && scene && origin && dest) {
    const packet = new THREE.Mesh(
      new THREE.SphereGeometry(0.32, 14, 14),
      new THREE.MeshBasicMaterial({color: 0x00f2fe, transparent:true, opacity:1, depthTest:false})
    );
    packet.renderOrder = 900;
    scene.add(packet);
    const trail = new THREE.Mesh(
      new THREE.SphereGeometry(0.5, 14, 14),
      new THREE.MeshBasicMaterial({color: 0x00f2fe, transparent:true, opacity:0.4, depthTest:false})
    );
    scene.add(trail);
    await new Promise(res => {
      const t0 = performance.now();
      function step(){
        const t = Math.min(1, (performance.now() - t0) / 1300);
        const e = t * t * (3 - 2 * t);   // smoothstep
        const x = origin.position.x + (dest.position.x - origin.position.x) * e;
        const z = origin.position.z + (dest.position.z - origin.position.z) * e;
        // Arc UP over the city · peak at 4 units
        const y = origin.position.y + (dest.position.y - origin.position.y) * e + Math.sin(e * Math.PI) * 4;
        packet.position.set(x, y, z);
        trail.position.set(x, y - 0.05, z);
        trail.material.opacity = 0.35 - t * 0.20;
        if (t < 1) requestAnimationFrame(step); else { res(); }
      }
      step();
    });
    // Destination flashes white briefly
    const destOrigEmissive = dest.material.emissive.getHex();
    const destOrigIntensity = dest.material.emissiveIntensity;
    dest.material.emissive.setHex(0xffffff);
    dest.material.emissiveIntensity = 1.5;
    await new Promise(r => setTimeout(r, 500));

    // STEP 5 · gold return packet
    packet.material.color.setHex(0xf5c542);
    trail.material.color.setHex(0xf5c542);
    await new Promise(res => {
      const t0 = performance.now();
      function step(){
        const t = Math.min(1, (performance.now() - t0) / 1200);
        const e = t * t * (3 - 2 * t);
        const x = dest.position.x + (origin.position.x - dest.position.x) * e;
        const z = dest.position.z + (origin.position.z - dest.position.z) * e;
        const y = dest.position.y + (origin.position.y - dest.position.y) * e + Math.sin(e * Math.PI) * 4;
        packet.position.set(x, y, z);
        trail.position.set(x, y - 0.05, z);
        trail.material.opacity = 0.35 - t * 0.20;
        if (t < 1) requestAnimationFrame(step); else { res(); }
      }
      step();
    });
    // Origin flashes gold briefly
    if (origin.material && origin.material.emissive){
      const oE = origin.material.emissive.getHex();
      origin.material.emissive.setHex(0xf5c542);
      origin.material.emissiveIntensity = 1.4;
      setTimeout(() => { origin.material.emissive.setHex(oE); origin.material.emissiveIntensity = stateEmissive(origin.userData.state); }, 700);
    }
    // Restore destination
    setTimeout(() => { dest.material.emissive.setHex(destOrigEmissive); dest.material.emissiveIntensity = destOrigIntensity; }, 700);
    // Cleanup packet + trail
    setTimeout(() => {
      scene.remove(packet); scene.remove(trail);
      packet.geometry.dispose(); packet.material.dispose();
      trail.geometry.dispose(); trail.material.dispose();
    }, 800);
  }

  await new Promise(r => setTimeout(r, 400));

  // STEP 6 · cross-fade BACK into office · stamp REPLY SECURED on the originating agent's task
  ov.style.opacity = '1';
  await new Promise(r => setTimeout(r, 520));
  const replyText = 'REPLY SECURED · from ' + (dest.userData.agency.name || dest.userData.agency.slug || dest.userData.slug);
  const tgt = (selectedAgent && officeAgents.includes(selectedAgent)) ? selectedAgent : officeAgents[0];
  if (tgt) setAgentState(tgt, 'IDLE', replyText);
  dispatchActive = false;
}

// ============ DATA DROPZONE · HTML5 drag-drop · POST to /api/agency_file_intake.php ============
let pendingDropFiles = [];
let officeDropParticles = [];

function setupDropzone(){
  const dz = document.getElementById('dropzone');
  const input = document.getElementById('dropzoneInput');
  if(!dz || !input) return;
  dz.addEventListener('click', () => input.click());
  input.addEventListener('change', e => acceptDropFiles(Array.from(e.target.files || [])));
  ['dragenter','dragover'].forEach(ev => dz.addEventListener(ev, e => {
    e.preventDefault(); e.stopPropagation();
    dz.style.background = 'rgba(245,197,66,.16)'; dz.style.borderColor = 'rgba(245,197,66,.9)';
  }));
  ['dragleave','drop'].forEach(ev => dz.addEventListener(ev, e => {
    e.preventDefault(); e.stopPropagation();
    dz.style.background = 'rgba(245,197,66,.05)'; dz.style.borderColor = 'rgba(245,197,66,.5)';
  }));
  dz.addEventListener('drop', e => {
    const fs = Array.from(e.dataTransfer.files || []);
    acceptDropFiles(fs);
  });
}
function acceptDropFiles(files){
  files.forEach(f => {
    if(f.size > 25 * 1024 * 1024){
      document.getElementById('dropzoneStatus').textContent = '⚠ ' + f.name + ' exceeds 25 MB';
      return;
    }
    pendingDropFiles.push(f);
    triggerDropParticles();
  });
  refreshDropList();
}
function refreshDropList(){
  const el = document.getElementById('dropzoneList');
  if(!el) return;
  el.innerHTML = pendingDropFiles.map((f,i) =>
    `<div style="display:flex;justify-content:space-between;gap:6px;padding:2px 0">▸ ${escapeHTML(f.name)} · ${(f.size/1024).toFixed(1)}KB</div>`
  ).join('');
  const btn = document.getElementById('dropzoneSend');
  btn.disabled = pendingDropFiles.length === 0;
  btn.style.opacity = pendingDropFiles.length === 0 ? '0.5' : '1';
}

function triggerDropParticles(){
  // Round-5 directive 5 · target the SELECTED agent (or first IDLE) · not random
  if(!officeAgents.length) return;
  let tgtAgent = selectedAgent && officeAgents.includes(selectedAgent) ? selectedAgent : null;
  if(!tgtAgent) tgtAgent = officeAgents.find(a => a.state === 'IDLE') || officeAgents[0];
  const target = tgtAgent.core.position;
  const startWorld = new THREE.Vector3(7, 5, 4); // approx world coord of the dropzone panel projected
  const sphereGeo = new THREE.SphereGeometry(0.09, 10, 10);
  for(let i = 0; i < 8; i++){
    const mat = new THREE.MeshBasicMaterial({color:0x43e6a1, transparent:true, opacity:1, depthTest:false});
    const m = new THREE.Mesh(sphereGeo, mat);
    m.renderOrder = 1000;
    m.position.copy(startWorld);
    officeScene.add(m);
    officeDropParticles.push({mesh:m, start: startWorld.clone(), end: target.clone(), progress: -i*0.07, speed: 0.022 + Math.random()*0.008, dead:false});
  }
}
function animateDropParticles(){
  for(let i = officeDropParticles.length - 1; i >= 0; i--){
    const p = officeDropParticles[i];
    if(p.dead){ officeScene.remove(p.mesh); p.mesh.material.dispose(); officeDropParticles.splice(i,1); continue; }
    p.progress += p.speed;
    if(p.progress < 0){ p.mesh.material.opacity = 0; continue; }
    if(p.progress >= 1){ p.dead = true; continue; }
    const t = p.progress;
    p.mesh.position.x = p.start.x + (p.end.x - p.start.x) * t;
    p.mesh.position.z = p.start.z + (p.end.z - p.start.z) * t;
    const arcY = 4 * t * (1 - t);
    p.mesh.position.y = (p.start.y + (p.end.y - p.start.y) * t) + arcY * 1.5;
    p.mesh.material.opacity = (1 - t) * 0.95;
  }
}

// v4.4.5 · sequentially flash each pipeline node white as the payload walks the chain
function sequencePipelineFlash(taskNote){
  if(!officeAgents.length || !officeAgents[0].pipelineLen) return;
  const pipelineLen = officeAgents[0].pipelineLen;
  const stages = officeAgents.slice(0, pipelineLen);
  const stageNotes = [
    'PARSE: ' + (taskNote || 'sovereign payload'),
    'COMPILE: routing through engine',
    'SYNTHESIZE: generating assets',
    'QA: sandbox audit · clean'
  ];
  stages.forEach((agent, idx) => {
    setTimeout(() => {
      setAgentState(agent, 'PROCESSING', stageNotes[idx] || ('stage ' + (idx+1)));
      setTimeout(() => setAgentState(agent, 'IDLE', 'completed: ' + (stageNotes[idx]||'').slice(0,28)), 1400);
    }, idx * 1500);
  });
}

async function sendDropzoneFiles(){
  if(!pendingDropFiles.length || !currentOfficeAgency) return;
  // v4.4.5 · enforce Connector Gateway before payload may flow
  const cstate = getConnectorState();
  if (!cstate.allArmed) {
    flashConnectorWarn();
    const status = document.getElementById('dropzoneStatus');
    status.innerHTML = `<span style="color:#f5c542">⚠ CRITICAL ENGINES OFFLINE: AWAITING CREDENTIAL PAYLOAD (${cstate.armed}/${cstate.total} armed)</span>`;
    return;
  }
  const btn = document.getElementById('dropzoneSend');
  const status = document.getElementById('dropzoneStatus');
  btn.disabled = true; btn.textContent = 'TRANSMITTING…';
  status.textContent = 'reading files…';
  // Read each file as base64
  const filePromises = pendingDropFiles.map(f => new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = () => {
      const b64 = (reader.result || '').split(',')[1] || '';
      resolve({name: f.name, type: f.type || 'application/octet-stream', data_b64: b64});
    };
    reader.onerror = () => resolve({name: f.name, type: f.type || '', data_b64: ''});
    reader.readAsDataURL(f);
  }));
  const files = await Promise.all(filePromises);
  status.textContent = 'uploading to ' + (currentOfficeAgency.name || currentOfficeAgency.id) + '…';
  try{
    const r = await fetch('/api/agency_file_intake.php', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        agency_slug: currentOfficeAgency.id || currentOfficeAgency.slug,
        task_note: document.getElementById('dropzoneNote').value || '',
        files: files
      })
    });
    const j = await r.json();
    if(j.ok){
      const ok = j.received.filter(x => x.ok).length;
      status.innerHTML = `<span style="color:var(--green)">✓ ${ok} of ${j.received.length} stored · ${j.storage}</span>`;
      // TRACK C · v4.4.5 SWARM EXECUTION · walk the payload down the pipeline (Director → Engine → Asset → QA)
      const fileNames = j.received.filter(x => x.ok).map(x => x.name).join(', ');
      sequencePipelineFlash(fileNames || 'data payload');
      // v4.4.7 · INTER-AGENCY DISPATCH · after pipeline cascade completes, fire macro-city packet flight (Skill #18)
      // The pipeline cascade takes ~6s (4 stages × 1.5s) · fire dispatch right at the QA stage so it overlaps
      setTimeout(() => {
        if (currentOfficeAgency) dispatchToAgency(currentOfficeAgency);
      }, 6200);
      pendingDropFiles = [];
      refreshDropList();
      // Visual flourish: burst green particles toward the now-PROCESSING agent
      for(let i = 0; i < 3; i++) setTimeout(triggerDropParticles, i*200);
    } else {
      status.innerHTML = `<span style="color:var(--red)">⚠ ${escapeHTML(j.error || 'upload failed')}</span>`;
    }
  }catch(e){
    status.innerHTML = `<span style="color:var(--red)">⚠ network: ${escapeHTML(e.message || String(e))}</span>`;
  } finally {
    btn.disabled = pendingDropFiles.length === 0; btn.textContent = 'SEND TO AGENCY';
  }
}

        active_data_packets: dataPackets.length,
        active_burst_particles: burstPool.length,
        council_position: `(${(buildings.find(b => b.userData.slug==='_council')||{position:{}}).position.x||0}, ${(buildings.find(b => b.userData.slug==='_council')||{position:{}}).position.y||0}, ${(buildings.find(b => b.userData.slug==='_council')||{position:{}}).position.z||0})`
      };
      snap.textContent = JSON.stringify(data);
    }catch(e){}
  }
}
// Refresh the crawler mirror every 4 seconds so any crawl-mid-session sees current state
setInterval(updateCrawlerMirror, 4000);

// ============ BOOT ============
loadAndBuild().then(() => setTimeout(updateCrawlerMirror, 800));
</script>
